<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root {
    --board-size: min(92vw, 420px);
    --bg1: #f1f2fb;
    --bg2: #e4e8f6;
    --board: #c5cbe6;
    --board-dark: #adb6da;
    --panel1: #bdb4ee;
    --panel2: #a493e4;
    --text: #5a5f86;
    --gap: 10px;
    --tile-radius: 8px;
}
* { box-sizing: border-box; }
body {
    background: radial-gradient(circle at top, #ffffff 0%, var(--bg1) 38%, var(--bg2) 100%);
    font-family: Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; margin: 0; padding: 20px 0;
    color: var(--text); overflow-x: hidden;
}
#app { width: var(--board-size); position: relative; }
.top-panel { display: flex; gap: 12px; margin-bottom: 15px; width: 100%; }
.score-card {
    flex: 1; background: linear-gradient(180deg, var(--panel1), var(--panel2));
    border-radius: 16px; padding: 10px; text-align: center; color: white;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
}
.score-value { font-size: 24px; font-weight: bold; }
#board {
    position: relative; width: 100%; aspect-ratio: 1/1;
    background: var(--board); border-radius: 20px; padding: 10px;
    touch-action: none;
}
.grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr); gap: var(--gap);
    width: 100%; height: 100%;
}
.cell { background: rgba(255,255,255,0.3); border-radius: var(--tile-radius); }
#tiles { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; }

/* 움찔거림 방지 핵심 CSS */
.tile {
    position: absolute;
    border-radius: var(--tile-radius);
    background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; color: #5a5f86;
    transition: transform 0.15s ease-out; /* 위치 이동 애니메이션 */
    will-change: transform;
    transform: translateZ(0); /* GPU 가속 */
}
.tile-num {
    position: absolute; right: 5px; bottom: 5px;
    background: rgba(255,255,255,0.8); padding: 2px 6px;
    border-radius: 10px; font-size: 12px;
}
.overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    color: white; border-radius: 20px; z-index: 100;
}
button {
    padding: 10px 20px; border: none; border-radius: 8px;
    background: white; color: var(--panel2); cursor: pointer; font-weight: bold;
}
</style>
</head>
<body>

<div id="app">
    <div class="top-panel">
        <div class="score-card"><div>SCORE</div><div id="score" class="score-value">0</div></div>
        <div class="score-card"><div>BEST</div><div id="best" class="score-value">0</div></div>
    </div>
    <div id="board">
        <div class="grid" id="bg"></div>
        <div id="tiles"></div>
        <div id="winoverlay" class="overlay"><h2>YOU WIN!</h2><button onclick="restart()">RESTART</button></div>
        <div id="gameover" class="overlay"><h2>GAME OVER</h2><button onclick="restart()">TRY AGAIN</button></div>
    </div>
</div>

<script>
const SIZE = 4;
let board = [];
let score = 0;
let best = localStorage.getItem("bestScore") || 0;

// 초기 그리드 생성
const bg = document.getElementById("bg");
for(let i=0; i<16; i++) bg.innerHTML += '<div class="cell"></div>';

function init() {
    board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
    score = 0;
    document.getElementById("best").innerText = best;
    document.getElementById("tiles").innerHTML = "";
    addRandom(); addRandom();
    render();
}

function addRandom() {
    let empty = [];
    for(let r=0; r<SIZE; r++) {
        for(let c=0; c<SIZE; c++) if(board[r][c] === 0) empty.push({r,c});
    }
    if(empty.length > 0) {
        let {r, c} = empty[Math.floor(Math.random()*empty.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }
}

// 타일 렌더링 최적화: 위치만 transform으로 조정
function render() {
    document.getElementById("score").innerText = score;
    const tilesContainer = document.getElementById("tiles");
    const containerRect = tilesContainer.getBoundingClientRect();
    const cellSize = (containerRect.width - (10 * (SIZE - 1))) / SIZE;

    // 현재 보드에 있어야 할 타일들의 정보를 수집
    let activeIds = [];

    for(let r=0;
