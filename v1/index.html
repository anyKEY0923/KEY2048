<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom 2048 Game</title>
    <style>
        :root { --bg-color: #bbada0; --cell-color: rgba(238, 228, 218, 0.35); }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #faf8ef; font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif; touch-action: none;}
        .score-container { font-size: 25px; font-weight: bold; margin-bottom: 20px; color: #776e65; }
        #game-board { position: relative; width: 400px; height: 400px; background-color: var(--bg-color); border-radius: 6px; padding: 10px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; width: 100%; height: 100%; }
        .cell { background-color: var(--cell-color); border-radius: 3px; }
        .tile {
            position: absolute; width: 87.5px; height: 87.5px;
            display: flex; justify-content: center; align-items: center;
            font-size: 35px; font-weight: bold; border-radius: 3px;
            transition: all 0.1s ease-in-out; background-size: cover; background-position: center;
        }
        /* 숫자별 스타일 및 이미지 설정 구역 */
        .tile-2 { background-image: url('./images//img_2.jpg'); 
        background-color: #f2b179; /* 이미지가 안 뜰 때를 대비한 기본색 */
        color: transparent; /* 숫자 글자를 숨기고 싶을 때 추가 */}
        .tile-4 {background-image: url('./images//img_4.jpg'); 
        background-color: #f59563;
        color: transparent;}

        .tile-8 { background-image: url('./images//img_8.jpg'); 
        background-color: #f2b179; /* 이미지가 안 뜰 때를 대비한 기본색 */
        color: transparent; /* 숫자 글자를 숨기고 싶을 때 추가 */}
        .tile-16 {background-image: url('./images//img_16.jpg'); 
        background-color: #f59563;
        color: transparent;}
       .tile-32 {background-image: url('./images//img_32.jpg'); 
       background-color: #f67c5f;
       color: transparent;}
        .tile-64 { background-image: url('./images//img_64.jpg'); 
        background-color: #f2b179; /* 이미지가 안 뜰 때를 대비한 기본색 */
        color: transparent; /* 숫자 글자를 숨기고 싶을 때 추가 */}
        .tile-128 {background-image: url('./images//img_128.jpg'); 
        background-color: #f59563;
        color: transparent;}
       .tile-256 {background-image: url('./images//img_256.jpg'); 
       background-color: #f67c5f;
       color: transparent;}
        .tile-512 { background-image: url('./images//img_512.jpg'); 
        background-color: #f2b179; /* 이미지가 안 뜰 때를 대비한 기본색 */
        color: transparent; /* 숫자 글자를 숨기고 싶을 때 추가 */}
        .tile-1024 {background-image: url('./images//img_1024.jpg'); 
        background-color: #f59563;
        color: transparent;}
       .tile-2048 {background-image: url('./images//img_2048.jpg'); 
       background-color: #f67c5f;
       color: transparent;}
    </style>
</head>
<body>
    <div class="score-container">Score: <span id="score">0</span></div>
    <div id="game-board">
        <div class="grid" id="grid-bg"></div>
        <div id="tile-container"></div>
    </div>

    <script>
        const boardSize = 4;
        let board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
        let score = 0;

        function init() {
            const bg = document.getElementById('grid-bg');
            for(let i=0; i<16; i++) bg.appendChild(document.createElement('div')).className='cell';
            addRandomTile(); addRandomTile();
            render();
        }

        function render() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            board.forEach((row, r) => {
                row.forEach((num, c) => {
                    if (num !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${num}`;
                        tile.style.top = `${r * 97.5 + 10}px`;
                        tile.style.left = `${c * 97.5 + 10}px`;
                        tile.innerText = num;
                        container.appendChild(tile);
                    }
                });
            });
            document.getElementById('score').innerText = score;
        }

        function addRandomTile() {
            let empty = [];
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(board[r][c]===0) empty.push({r,c});
            if(empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random()*empty.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function slide(row) {
            let arr = row.filter(val => val !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2; score += arr[i];
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < boardSize) arr.push(0);
            return arr;
        }

        function rotateBoard() { // 시계방향 90도 회전
            let newBoard = board[0].map((val, index) => board.map(row => row[index]).reverse());
            board = newBoard;
        }

        function move(direction) {
            let oldBoard = JSON.stringify(board);
            // 방향에 따라 보드 회전 -> 왼쪽 슬라이드 -> 다시 원상복구
            let rotations = {"ArrowLeft": 0, "ArrowDown": 1, "ArrowRight": 2, "ArrowUp": 3}[direction];
            for(let i=0; i<rotations; i++) rotateBoard();
            board = board.map(row => slide(row));
            for(let i=0; i<(4-rotations)%4; i++) rotateBoard();

            if (oldBoard !== JSON.stringify(board)) {
                addRandomTile();
                render();
            }
        }

        window.addEventListener('keydown', e => {
            if(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) move(e.key);
        });

// 2. 새로 추가할 모바일 터치 이벤트
        let startX, startY;
        window.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', (e) => {
            if (!startX || !startY) return;
            let endX = e.changedTouches[0].clientX;
            let endY = e.changedTouches[0].clientY;
            let diffX = endX - startX;
            let diffY = endY - startY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 30) move(diffX > 0 ? "ArrowRight" : "ArrowLeft");
            } else {
                if (Math.abs(diffY) > 30) move(diffY > 0 ? "ArrowDown" : "ArrowUp");
            }
            startX = null; startY = null;
        });
        init();
    </script>
</body>
</html>
