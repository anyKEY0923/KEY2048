<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root{
    --board-size:min(92vw,420px);

    /* 바탕색: 아주 살짝 더 맑게 */
    --bg1:#f2eef9;
    --bg2:#e8e2f3;

    --board:#c8c0df;
    --board-dark:#b5acd3;

    --panel1:#bfb5de;
    --panel2:#a99fd0;

    --panel-label:#f4f1ff;
    --panel-value:#ffffff;

    --text:#5e587a;
    --sub:#7a7398;

    --gap:10px;

    /* 보드 패딩: 상단만 2px 더 */
    --pad-x:10px;
    --pad-top:12px;
    --pad-bottom:10px;

    --tile-radius:8px;
}
*{
    box-sizing:border-box;
}
html, body{
    margin:0;
    min-height:100%;
}
body{
    background:
        radial-gradient(circle at top, #fdfcff 0%, var(--bg1) 38%, var(--bg2) 100%);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:18px 0;
    touch-action:none;
    color:var(--text);
}
#app{
    width:var(--board-size);
    display:flex;
    flex-direction:column;
    align-items:stretch;
}
.version-note{
    font-size:12px;
    color:#8a82a6;
    margin-bottom:8px;
    text-align:center;
}
.title-banner{
    width:100%;
    height:84px;
    background-image:url('./images/img_title.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    border-radius:16px;
    margin-bottom:10px;
    box-shadow:
        0 12px 22px rgba(70,60,120,.12),
        inset 0 1px 0 rgba(255,255,255,.22);
}
.banner-desc{
    width:100%;
    margin-bottom:14px;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.58);
    backdrop-filter:blur(4px);
    box-shadow:
        0 6px 16px rgba(70,60,120,.03),
        inset 0 1px 0 rgba(255,255,255,.65);
    font-size:13px;
    line-height:1.5;
    color:#807a95;
    text-align:center;
}
.top-panel{
    width:100%;
    display:flex;
    align-items:stretch;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
}
.score-card{
    flex:1;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, var(--panel1) 0%, var(--panel2) 100%);
    border-radius:16px;
    padding:12px 14px;
    min-height:72px;
    box-shadow:
        0 10px 18px rgba(70,60,120,.12),
        inset 0 1px 0 rgba(255,255,255,.20);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.score-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:46%;
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0));
    pointer-events:none;
}
.score-label{
    font-size:12px;
    font-weight:bold;
    color:var(--panel-label);
    letter-spacing:.5px;
    margin-bottom:6px;
    position:relative;
    z-index:1;
}
.score-value{
    font-size:26px;
    line-height:1;
    font-weight:bold;
    color:var(--panel-value);
    position:relative;
    z-index:1;
    text-shadow:0 2px 5px rgba(74, 60, 112, .14);
}

/* 추가: 점수 상승 연출 */
.score-gain{
    position:absolute;
    top:10px;
    right:12px;
    font-size:16px;
    font-weight:700;
    color:rgba(255,255,255,.96);
    text-shadow:0 2px 6px rgba(74,60,112,.20);
    pointer-events:none;
    animation:scoreFloat .65s ease forwards;
    z-index:4;
}
@keyframes scoreFloat{
    0%{
        opacity:0;
        transform:translateY(6px) scale(.92);
    }
    18%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    100%{
        opacity:0;
        transform:translateY(-18px) scale(1.04);
    }
}

/* 추가: 최고기록 갱신 연출 */
.best-burst{
    animation:bestPulse .7s ease;
}
.best-tag{
    position:absolute;
    top:10px;
    right:10px;
    padding:4px 8px;
    border-radius:999px;
    background:rgba(255,255,255,.92);
    color:#7b6aa8;
    font-size:10px;
    font-weight:800;
    letter-spacing:.4px;
    box-shadow:0 4px 10px rgba(74,60,112,.12);
    animation:bestTagPop .9s ease forwards;
    pointer-events:none;
    z-index:4;
}
@keyframes bestPulse{
    0%{ transform:scale(1); }
    35%{ transform:scale(1.06); }
    100%{ transform:scale(1); }
}
@keyframes bestTagPop{
    0%{
        opacity:0;
        transform:translateY(4px) scale(.92);
    }
    20%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    100%{
        opacity:0;
        transform:translateY(-10px) scale(1);
    }
}

/* 추가: 상시 새 게임 버튼 */
.controls{
    display:flex;
    justify-content:flex-end;
    margin:-2px 0 12px;
}
.ghost-btn{
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:13px;
    font-weight:700;
    color:#6c628e;
    background:rgba(255,255,255,.68);
    box-shadow:
        0 6px 14px rgba(70,60,120,.06),
        inset 0 1px 0 rgba(255,255,255,.7);
    cursor:pointer;
}
.ghost-btn:active{
    transform:scale(.98);
}

#board{
    position:relative;
    width:100%;
    aspect-ratio:1 / 1;
    box-sizing:border-box;
    background:
        linear-gradient(180deg, #d3cbe8 0%, var(--board) 54%, var(--board-dark) 100%);
    padding:0;
    border-radius:20px;
    box-shadow:
        0 16px 30px rgba(70,60,120,.15),
        inset 0 1px 0 rgba(255,255,255,.30),
        inset 0 -1px 0 rgba(74,60,112,.05);
    overflow:hidden;
}
#board::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:24%;
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0));
    pointer-events:none;
    z-index:0;
}
.grid{
    position:absolute;
    top:var(--pad-top);
    left:var(--pad-x);
    right:var(--pad-x);
    bottom:var(--pad-bottom);
    z-index:1;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:var(--gap);
}
.cell{
    background:rgba(238,239,245,.42);
    border-radius:var(--tile-radius);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.22);
}
#tiles,
#anim-layer{
    position:absolute;
    top:var(--pad-top);
    left:var(--pad-x);
    right:var(--pad-x);
    bottom:var(--pad-bottom);
    pointer-events:none;
    z-index:2;
    overflow:hidden;
    border-radius:12px;
}
.tile,
.anim-tile{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:var(--tile-radius);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}
.tile{
    z-index:5;
}
.anim-tile{
    transition:
        top .14s ease,
        left .14s ease,
        opacity .14s ease,
        transform .14s ease;
    z-index:20;
}
.tile-new{
    transform:scale(0);
    animation:popIn .14s ease forwards;
}
.tile-merge{
    animation:merge .22s ease-out;
    will-change:transform;
}
.tile-num{
    position:absolute;
    right:6px;
    bottom:6px;
    min-width:22px;
    padding:2px 6px;
    border-radius:999px;
    background:rgba(255,255,255,.72);
    color:#5f5978;
    font-size:11px;
    line-height:1.1;
    font-weight:700;
    text-align:center;
    box-shadow:
        0 1px 3px rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.5);
    backdrop-filter:blur(2px);
    pointer-events:none;
}
@keyframes popIn{
    from{ transform:scale(0); }
    to{ transform:scale(1); }
}
@keyframes merge{
    0%{ transform:scale(1); }
    45%{ transform:scale(1.20); }
    100%{ transform:scale(1); }
}
.overlay{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:rgba(60,50,100,.60);
    color:white;
    z-index:100;
    border-radius:20px;
    backdrop-filter:blur(2px);
}
.overlay-img{
    width:180px;
    height:180px;
    background-size:cover;
    background-position:center;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 10px 22px rgba(44,34,73,.24);
}
.overlay-title{
    margin-bottom:10px;
    font-size:22px;
    font-weight:bold;
    letter-spacing:.6px;
}
.overlay-msg{
    margin-bottom:18px;
    font-size:14px;
    line-height:1.45;
    color:rgba(255,255,255,.88);
    text-align:center;
    padding:0 20px;
}
.overlay-sub{
    margin:-6px 0 14px;
    font-size:14px;
    color:rgba(255,255,255,.92);
    letter-spacing:.2px;
}
.overlay-buttons{
    display:flex;
    gap:10px;
}
.overlay button{
    padding:12px 26px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#f4f1ff;
    color:#685d8c;
    box-shadow:0 6px 14px rgba(74,60,112,.14);
}
.overlay button:active{
    transform:scale(.98);
}
@media (max-width:420px){
    .title-banner{
        height:72px;
        border-radius:14px;
    }
    .banner-desc{
        font-size:12px;
        padding:9px 12px;
    }
    .score-card{
        min-height:68px;
        border-radius:14px;
    }
    .score-value{
        font-size:22px;
    }
    #board{
        border-radius:18px;
    }
    .overlay{
        border-radius:18px;
    }
    .tile-num{
        right:5px;
        bottom:5px;
        min-width:20px;
        padding:2px 5px;
        font-size:10px;
    }
    .overlay-msg,
    .overlay-sub{
        font-size:13px;
    }
}
</style>
</head>
<body>

<div id="app">
    <div class="version-note">
        v2.5.0 수정 : 엔딩 정보 강화, 점수/최고기록 연출 추가, 상시 새 게임 버튼 추가
    </div>

    <div class="title-banner"></div>

    <div class="banner-desc">
        상하좌우로 밀어 같은 숫자를 합쳐 2048을 만들어보세요!
    </div>

    <div class="top-panel">
        <div class="score-card" id="score-card">
            <div class="score-label">현재점수</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-card" id="best-card">
            <div class="score-label">최고기록</div>
            <div class="score-value" id="best">0</div>
        </div>
    </div>

    <div class="controls">
        <button class="ghost-btn" onclick="restart()">새 게임</button>
    </div>

    <div id="board">
        <div class="grid" id="bg"></div>
        <div id="tiles"></div>
        <div id="anim-layer"></div>

        <div id="winoverlay" class="overlay">
            <div id="win-img" class="overlay-img"></div>
            <div class="overlay-title">축하해요!</div>
            <div class="overlay-msg">2048 타일을 완성했어요 ✨</div>
            <div id="win-tile-label" class="overlay-sub"></div>
            <div class="overlay-buttons">
                <button onclick="restart()">REPLAY</button>
            </div>
        </div>

        <div id="gameover" class="overlay">
            <div id="gameover-img" class="overlay-img"></div>
            <div class="overlay-title">여기까지도 훌륭해요</div>
            <div id="gameover-msg" class="overlay-msg">다음 판엔 더 큰 타일을 노려봐요</div>
            <div id="gameover-tile-label" class="overlay-sub"></div>
            <div class="overlay-buttons">
                <button onclick="restart()">REPLAY</button>
            </div>
        </div>
    </div>
</div>

<script>
/*
v2.5.0 수정점
1) 엔딩 오버레이에 최고 타일 숫자 표시 추가
2) 승리/패배 메시지를 더 부드럽고 기분 좋게 개선
3) 점수 상승 시 +점수 플로팅 연출 추가
4) 최고기록 갱신 시 NEW BEST 연출 추가
5) 플레이 중에도 누를 수 있는 상시 새 게임 버튼 추가
*/

const SIZE = 4;
const GAP = 10;
const MOVE_MS = 140;

let board = [];
let score = 0;
let best = Number(localStorage.getItem("bestScore") || 0);
let wonShown = false;
let moving = false;

let cellWidth = 0;
let cellHeight = 0;

let lastSpawn = null;
let mergeCells = [];

const tilesEl = document.getElementById("tiles");
const animLayer = document.getElementById("anim-layer");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const bg = document.getElementById("bg");
const winOverlay = document.getElementById("winoverlay");
const gameOverOverlay = document.getElementById("gameover");
const winImg = document.getElementById("win-img");
const gameOverImg = document.getElementById("gameover-img");
const winTileLabel = document.getElementById("win-tile-label");
const gameOverTileLabel = document.getElementById("gameover-tile-label");
const gameOverMsg = document.getElementById("gameover-msg");
const scoreCardEl = document.getElementById("score-card");
const bestCardEl = document.getElementById("best-card");

bestEl.innerText = String(best);

function emptyBoard(){
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
}

function calculateLayout(){
    const width = tilesEl.clientWidth;
    const height = tilesEl.clientHeight;

    cellWidth = (width - GAP * (SIZE - 1)) / SIZE;
    cellHeight = (height - GAP * (SIZE - 1)) / SIZE;

    renderBoard();
}

function pos(r, c){
    return {
        top: (cellHeight + GAP) * r,
        left: (cellWidth + GAP) * c
    };
}

function hideOverlays(){
    winOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";
}

function showWin(){
    const max = getMaxTile() || 2048;
    winImg.style.backgroundImage = "url('./images/img_2048.jpg')";
    winTileLabel.textContent = `최고 타일 ${max}`;
    winOverlay.style.display = "flex";
}

function showGameOver(){
    const max = getMaxTile() || 2;
    gameOverImg.style.backgroundImage = `url('./images/img_${max}.jpg')`;
    gameOverTileLabel.textContent = `이번 판 최고 타일 ${max}`;

    gameOverMsg.textContent = max >= 1024
        ? "거의 다 왔어요. 다음 판엔 2048까지!"
        : "다음 판엔 더 큰 타일을 노려봐요";

    gameOverOverlay.style.display = "flex";
}

function getMaxTile(){
    let max = 0;
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] > max) max = board[r][c];
        }
    }
    return max;
}

function celebrateBest(){
    bestCardEl.classList.remove("best-burst");
    void bestCardEl.offsetWidth;
    bestCardEl.classList.add("best-burst");

    const oldTag = bestCardEl.querySelector(".best-tag");
    if(oldTag) oldTag.remove();

    const tag = document.createElement("div");
    tag.className = "best-tag";
    tag.textContent = "NEW BEST!";
    bestCardEl.appendChild(tag);

    setTimeout(() => {
        bestCardEl.classList.remove("best-burst");
        tag.remove();
    }, 900);
}

function showScoreGain(amount){
    if(!amount) return;

    const el = document.createElement("div");
    el.className = "score-gain";
    el.textContent = `+${amount}`;
    scoreCardEl.appendChild(el);

    setTimeout(() => {
        el.remove();
    }, 700);
}

function updateScore(){
    scoreEl.innerText = String(score);

    const prevBest = best;
    if(score > best){
        best = score;
        localStorage.setItem("bestScore", String(best));

        if(best > prevBest){
            celebrateBest();
        }
    }
    bestEl.innerText = String(best);
}

function appendTileNumberBadge(el, value){
    const badge = document.createElement("div");
    badge.className = "tile-num";
    badge.textContent = value;
    el.appendChild(badge);
}

function renderBoard(){
    if(!cellWidth || !cellHeight) return;

    tilesEl.innerHTML = "";

    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            const value = board[r][c];
            if(!value) continue;

            const tile = document.createElement("div");
            tile.className = "tile";
            tile.style.width = cellWidth + "px";
            tile.style.height = cellHeight + "px";

            const p = pos(r, c);
            tile.style.top = p.top + "px";
            tile.style.left = p.left + "px";
            tile.style.backgroundImage = `url('./images/img_${value}.jpg')`;

            if(lastSpawn && lastSpawn.r === r && lastSpawn.c === c){
                tile.classList.add("tile-new");
            }

            if(mergeCells.some(m => m.r === r && m.c === c)){
                tile.classList.add("tile-merge");
            }

            appendTileNumberBadge(tile, value);
            tilesEl.appendChild(tile);
        }
    }
}

function getEmptyCells(){
    const empty = [];
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) empty.push({ r, c });
        }
    }
    return empty;
}

function spawn(){
    const empty = getEmptyCells();
    if(empty.length === 0){
        lastSpawn = null;
        return;
    }

    const pick = empty[Math.floor(Math.random() * empty.length)];
    board[pick.r][pick.c] = Math.random() < 0.9 ? 2 : 4;
    lastSpawn = { r: pick.r, c: pick.c };
}

function has2048Tile(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] >= 2048) return true;
        }
    }
    return false;
}

function isGameOver(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) return false;
            if(c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
            if(r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
        }
    }
    return true;
}

function cloneBoard(src){
    return src.map(row => [...row]);
}

function linesEqual(a, b){
    for(let i = 0; i < a.length; i++){
        if(a[i] !== b[i]) return false;
    }
    return true;
}

function slideAndMergeLineDetailed(line){
    const items = [];
    for(let i = 0; i < line.length; i++){
        if(line[i] !== 0){
            items.push({ value: line[i], from: i });
        }
    }

    const result = Array(SIZE).fill(0);
    const moves = [];
    const merges = [];
    let gained = 0;
    let write = 0;

    for(let i = 0; i < items.length; i++){
        const cur = items[i];
        const next = items[i + 1];

        if(next && cur.value === next.value){
            const mergedValue = cur.value * 2;
            result[write] = mergedValue;
            gained += mergedValue;

            moves.push({
                from: cur.from,
                to: write,
                value: cur.value,
                merged: true
            });
            moves.push({
                from: next.from,
                to: write,
                value: next.value,
                merged: true
            });

            merges.push({
                index: write,
                value: mergedValue
            });

            i++;
            write++;
        }else{
            result[write] = cur.value;
            moves.push({
                from: cur.from,
                to: write,
                value: cur.value,
                merged: false
            });
            write++;
        }
    }

    return {
        line: result,
        gained,
        moves,
        merges
    };
}

function buildMoveResult(dir){
    const oldBoard = cloneBoard(board);
    const newBoard = emptyBoard();
    const animations = [];
    const mergedCellsOut = [];
    let moved = false;
    let gainedTotal = 0;

    if(dir === "ArrowLeft" || dir === "ArrowRight"){
        for(let r = 0; r < SIZE; r++){
            const original = [...oldBoard[r]];
            const working = dir === "ArrowLeft" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalLine = dir === "ArrowLeft" ? res.line : [...res.line].reverse();

            newBoard[r] = finalLine;
            gainedTotal += res.gained;

            if(!linesEqual(original, finalLine)) moved = true;

            res.moves.forEach(m => {
                const fromC = dir === "ArrowLeft" ? m.from : (SIZE - 1 - m.from);
                const toC = dir === "ArrowLeft" ? m.to : (SIZE - 1 - m.to);

                animations.push({
                    fromR: r,
                    fromC,
                    toR: r,
                    toC,
                    value: m.value,
                    merged: m.merged
                });
            });

            res.merges.forEach(m => {
                const c = dir === "ArrowLeft" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }else{
        for(let c = 0; c < SIZE; c++){
            const original = [];
            for(let r = 0; r < SIZE; r++) original.push(oldBoard[r][c]);

            const working = dir === "ArrowUp" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalCol = dir === "ArrowUp" ? res.line : [...res.line].reverse();

            for(let r = 0; r < SIZE; r++) newBoard[r][c] = finalCol[r];
            gainedTotal += res.gained;

            if(!linesEqual(original, finalCol)) moved = true;

            res.moves.forEach(m => {
                const fromR = dir === "ArrowUp" ? m.from : (SIZE - 1 - m.from);
                const toR = dir === "ArrowUp" ? m.to : (SIZE - 1 - m.to);

                animations.push({
                    fromR,
                    fromC: c,
                    toR,
                    toC: c,
                    value: m.value,
                    merged: m.merged
                });
            });

            res.merges.forEach(m => {
                const r = dir === "ArrowUp" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }

    return {
        newBoard,
        animations,
        mergeCells: mergedCellsOut,
        gained: gainedTotal,
        moved
    };
}

function createAnimTile(value, r, c){
    const el = document.createElement("div");
    el.className = "anim-tile";
    el.style.width = cellWidth + "px";
    el.style.height = cellHeight + "px";

    const p = pos(r, c);
    el.style.top = p.top + "px";
    el.style.left = p.left + "px";
    el.style.backgroundImage = `url('./images/img_${value}.jpg')`;

    appendTileNumberBadge(el, value);
    animLayer.appendChild(el);
    return el;
}

function playMoveAnimation(animations, onDone){
    animLayer.innerHTML = "";

    if(animations.length === 0){
        onDone();
        return;
    }

    const animTiles = animations.map(a => {
        const el = createAnimTile(a.value, a.fromR, a.fromC);
        return { el, ...a };
    });

    tilesEl.style.visibility = "hidden";

    requestAnimationFrame(() => {
        animTiles.forEach(a => {
            const p = pos(a.toR, a.toC);
            a.el.style.top = p.top + "px";
            a.el.style.left = p.left + "px";

            if(a.merged){
                a.el.style.opacity = "0.9";
            }
        });
    });

    setTimeout(() => {
        animLayer.innerHTML = "";
        onDone();
    }, MOVE_MS + 20);
}

function move(dir){
    if(moving) return;
    if(winOverlay.style.display === "flex") return;
    if(gameOverOverlay.style.display === "flex") return;

    moving = true;
    lastSpawn = null;
    mergeCells = [];

    const res = buildMoveResult(dir);

    if(!res.moved){
        moving = false;
        return;
    }

    score += res.gained;
    updateScore();
    showScoreGain(res.gained);

    playMoveAnimation(res.animations, () => {
        board = res.newBoard;
        mergeCells = res.mergeCells;

        spawn();
        renderBoard();
        tilesEl.style.visibility = "visible";

        setTimeout(() => {
            mergeCells = [];
        }, 220);

        if(!wonShown && has2048Tile()){
            wonShown = true;
            showWin();
        }else if(isGameOver()){
            showGameOver();
        }

        moving = false;
    });
}

function restart(){
    hideOverlays();
    animLayer.innerHTML = "";
    tilesEl.style.visibility = "visible";

    board = emptyBoard();
    score = 0;
    wonShown = false;
    moving = false;
    lastSpawn = null;
    mergeCells = [];

    scoreEl.innerText = "0";
    bestEl.innerText = String(best);

    spawn();
    spawn();
    renderBoard();
}

window.addEventListener("keydown", e => {
    if(e.shiftKey && (e.key === "W" || e.key === "w")){
        e.preventDefault();
        if(winOverlay.style.display === "flex"){
            hideOverlays();
        }else{
            showWin();
        }
        return;
    }

    if(e.key === "Escape"){
        hideOverlays();
        return;
    }

    if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
        e.preventDefault();
        move(e.key);
    }
});

let startX = 0;
let startY = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, { passive:true });

document.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    if(Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;

    if(Math.abs(dx) > Math.abs(dy)){
        move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    }else{
        move(dy > 0 ? "ArrowDown" : "ArrowUp");
    }
}, { passive:true });

function init(){
    if(bg.children.length === 0){
        for(let i = 0; i < 16; i++){
            const d = document.createElement("div");
            d.className = "cell";
            bg.appendChild(d);
        }
    }

    board = emptyBoard();
    updateScore();
    spawn();
    spawn();

    requestAnimationFrame(() => {
        calculateLayout();
    });

    window.addEventListener("resize", calculateLayout);
}

init();
</script>
