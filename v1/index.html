<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom 2048 Game</title>
    <style>
        :root { --bg-color: #bbada0; --cell-color: rgba(238, 228, 218, 0.35); }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #faf8ef; font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif; touch-action: none; }
        .score-container { font-size: 25px; font-weight: bold; margin-bottom: 20px; color: #776e65; }
        #game-board { position: relative; width: 400px; height: 400px; background-color: var(--bg-color); border-radius: 6px; padding: 10px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; width: 100%; height: 100%; }
        .cell { background-color: var(--cell-color); border-radius: 3px; }
        .tile {
            position: absolute; width: 87.5px; height: 87.5px;
            display: flex; justify-content: center; align-items: center;
            font-size: 35px; font-weight: bold; border-radius: 3px;
            transition: all 0.2s ease-in-out; /* 부드러운 이동 */
            background-size: cover; background-position: center;
        }
        .tile-merged { animation: pop 0.2s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        [class*="tile-"] { color: transparent; } 
    </style>
</head>
<body>
    <div class="score-container">Score: <span id="score">0</span></div>
    <div id="game-board">
        <div class="grid" id="grid-bg"></div>
        <div id="tile-container"></div>
    </div>

    <script>
        const boardSize = 4;
        let board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
        let score = 0;
        let mergedTiles = [];

        function init() {
            const bg = document.getElementById('grid-bg');
            for(let i=0; i<16; i++) bg.appendChild(document.createElement('div')).className='cell';
            addRandomTile(); addRandomTile();
            render();
        }

        function render() {
            const container = document.getElementById('tile-container');
            // innerHTML을 비우는 대신, 기존 타일들을 애니메이션 후 삭제하도록 유도
            container.innerHTML = ''; 
            
            board.forEach((row, r) => {
                row.forEach((num, c) => {
                    if (num !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${num}`;
                        if (mergedTiles.some(t => t.row === r && t.col === c)) tile.classList.add('tile-merged');
                        
                        // 위치 설정
                        tile.style.top = `${r * 97.5 + 10}px`;
                        tile.style.left = `${c * 97.5 + 10}px`;
                        tile.innerText = num;
                        container.appendChild(tile);
                    }
                });
            });
            document.getElementById('score').innerText = score;
        }

        function addRandomTile() {
            let empty = [];
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(board[r][c]===0) empty.push({r,c});
            if(empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random()*empty.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function slide(row, rowIndex) {
            let arr = row.filter(val => val !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2; 
                    score += arr[i];
                    mergedTiles.push({ row: rowIndex, col: i });
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < boardSize) arr.push(0);
