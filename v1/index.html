<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root{
    --board-size:min(92vw,420px);

    --bg1:#f1f2fb;
    --bg2:#e4e8f6;

    --board:#c5cbe6;
    --board-dark:#adb6da;

    --panel1:#bdb4ee;
    --panel2:#a493e4;

    --panel-label:#f7f7ff;
    --panel-value:#ffffff;

    --text:#5a5f86;
    --sub:#747a9f;

    --gap:10px;
    --tile-radius:8px;
}
*{ box-sizing:border-box; }

html, body{
    margin:0;
    min-height:100%;
}
html{
    overflow-x:hidden;
    overflow-y:auto;
}
body{
    background:
        radial-gradient(circle at top, #ffffff 0%, var(--bg1) 38%, var(--bg2) 100%);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    padding:18px 0 24px;
    color:var(--text);
    overflow-x:hidden;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
}

#app{
    width:var(--board-size);
    display:flex;
    flex-direction:column;
    align-items:stretch;
    position:relative;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    flex:0 0 auto;
}

.version-note{
    font-size:12px;
    color:#8a90b0;
    margin-bottom:8px;
    text-align:center;
}

.loading-note{
    display:none;
    margin-bottom:14px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(255,255,255,.66);
    color:#7d84a2;
    font-size:13px;
    text-align:center;
    box-shadow:
        0 6px 14px rgba(70,60,120,.04),
        inset 0 1px 0 rgba(255,255,255,.7);
}
.loading-note.show{
    display:block;
}

.debug-indicator{
    display:none;
    margin-bottom:8px;
    padding:7px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.84);
    color:#6f76bf;
    font-size:12px;
    font-weight:800;
    letter-spacing:.3px;
    text-align:center;
    box-shadow:
        0 6px 14px rgba(70,60,120,.08),
        inset 0 1px 0 rgba(255,255,255,.7);
}
.debug-indicator.show{
    display:block;
}

.milestone-wrap{
    position:absolute;
    top:36px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    pointer-events:none;
    z-index:300;
}
.milestone{
    padding:10px 16px;
    border-radius:999px;
    background:rgba(255,255,255,.92);
    color:#666f98;
    font-size:14px;
    font-weight:800;
    letter-spacing:.2px;
    box-shadow:
        0 10px 22px rgba(70,60,120,.12),
        inset 0 1px 0 rgba(255,255,255,.7);
    animation:milestonePop 1.05s ease forwards;
    backdrop-filter:blur(4px);
}
@keyframes milestonePop{
    0%{ opacity:0; transform:translateY(10px) scale(.92); }
    18%{ opacity:1; transform:translateY(0) scale(1); }
    82%{ opacity:1; transform:translateY(0) scale(1); }
    100%{ opacity:0; transform:translateY(-18px) scale(1.02); }
}

.title-banner{
    width:100%;
    aspect-ratio:3.5 / 1;
    background-image:url('./images/img_title.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    border:none;
    border-radius:16px;
    margin-bottom:8px;
    box-shadow:
        0 12px 22px rgba(84,96,156,.12),
        inset 0 1px 0 rgba(255,255,255,.24);
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
    appearance:none;
    -webkit-appearance:none;
}
.title-banner:hover{
    filter:brightness(1.02) saturate(1.03);
}
.title-banner:active{
    transform:scale(.992);
}
.title-banner:focus-visible{
    outline:none;
    box-shadow:
        0 0 0 3px rgba(255,255,255,.72),
        0 0 0 6px rgba(126,102,191,.24),
        0 12px 22px rgba(84,96,156,.12),
        inset 0 1px 0 rgba(255,255,255,.24);
}

.banner-desc{
    width:100%;
    margin-bottom:10px;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.70);
    backdrop-filter:blur(4px);
    box-shadow:
        0 6px 16px rgba(82,66,140,.04),
        inset 0 1px 0 rgba(255,255,255,.74);
    font-size:13px;
    line-height:1.5;
    color:#70779b;
    text-align:center;
}

.top-panel{
    width:100%;
    display:flex;
    align-items:stretch;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
}

.score-card{
    flex:1;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, var(--panel1) 0%, var(--panel2) 100%);
    border-radius:16px;
    padding:12px 14px;
    min-height:72px;
    box-shadow:
        0 10px 18px rgba(88,98,160,.14),
        inset 0 1px 0 rgba(255,255,255,.22);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.score-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:46%;
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0));
    pointer-events:none;
}
.score-label{
    font-size:12px;
    font-weight:bold;
    color:var(--panel-label);
    letter-spacing:.5px;
    margin-bottom:6px;
    position:relative;
    z-index:1;
}
.score-value{
    font-size:26px;
    line-height:1;
    font-weight:bold;
    color:var(--panel-value);
    position:relative;
    z-index:1;
    text-shadow:0 2px 5px rgba(74, 60, 112, .14);
}

.game-board-wrap{
    position:relative;
}

.board{
    background:linear-gradient(180deg, var(--board) 0%, var(--board-dark) 100%);
    border-radius:18px;
    padding:var(--gap);
    position:relative;
    box-shadow:
        0 12px 18px rgba(86,96,154,.10),
        inset 0 1px 0 rgba(255,255,255,.18),
        inset 0 -1px 0 rgba(124,132,186,.10);
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:var(--gap);
}

.cell{
    width:100%;
    aspect-ratio:1 / 1;
    border-radius:var(--tile-radius);
    background:rgba(255,255,255,.19);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        inset 0 -1px 0 rgba(89,96,150,.04);
}

.tiles,
.anim-layer{
    position:absolute;
    inset:var(--gap);
    pointer-events:none;
}

.tile,
.anim-tile{
    position:absolute;
    border-radius:var(--tile-radius);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    box-shadow:
        0 8px 14px rgba(77,84,131,.12),
        inset 0 1px 0 rgba(255,255,255,.16);
    overflow:hidden;
    transform:translate3d(0,0,0);
    will-change:transform,opacity;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
}

.tile{
}
.tile.spawn{
    animation:spawnIn .18s ease-out;
}
@keyframes spawnIn{
    0%{ transform:scale(.72); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
}

.tile.merge-pop{
    animation:mergePop .26s cubic-bezier(.2,.9,.2,1);
}
@keyframes mergePop{
    0%{ transform:scale(1); }
    38%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
}

.anim-tile{
    transition:
        transform var(--moveDur,240ms) cubic-bezier(.22,.92,.28,1),
        opacity .12s linear,
        filter .12s linear;
}

.tile-badge{
    position:absolute;
    right:6px;
    bottom:6px;
    min-width:22px;
    height:22px;
    padding:0 6px;
    border-radius:999px;
    background:rgba(255,255,255,.92);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:800;
    line-height:1;
    color:#636b96;
    box-shadow:
        0 3px 8px rgba(65,55,105,.14),
        inset 0 1px 0 rgba(255,255,255,.72);
    pointer-events:none;
}

.overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:rgba(239,242,252,.74);
    backdrop-filter:blur(8px);
    z-index:200;
    border-radius:18px;
}
.overlay-card{
    width:min(100%, 340px);
    border-radius:24px;
    padding:22px 18px 18px;
    background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,248,255,.95));
    box-shadow:
        0 20px 44px rgba(72,78,125,.18),
        inset 0 1px 0 rgba(255,255,255,.88);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    position:relative;
}
.overlay-pretitle{
    font-size:14px;
    color:#848cb1;
    font-weight:800;
    letter-spacing:.2px;
}
.overlay-img{
    position:relative;
    width:172px;
    aspect-ratio:1 / 1;
    border-radius:22px;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    box-shadow:
        0 16px 28px rgba(88,94,146,.18),
        inset 0 1px 0 rgba(255,255,255,.26);
    overflow:hidden;
}
.gold-stars{
    position:absolute;
    inset:0;
    pointer-events:none;
}
.gold-star{
    position:absolute;
    left:var(--x);
    top:var(--y);
    width:14px;
    height:14px;
    transform:translate(-50%, -50%) scale(var(--scale,1));
    opacity:.95;
    filter:
        drop-shadow(0 0 4px rgba(255,226,112,.82))
        drop-shadow(0 0 7px rgba(255,201,74,.44));
    animation:
        starBlink var(--blinkDur,3s) ease-in-out infinite,
        starFloat var(--floatDur,5s) ease-in-out infinite;
    animation-delay:
        var(--blinkDelay,0s),
        var(--floatDelay,0s);
}
.gold-star::before,
.gold-star::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    background:linear-gradient(180deg, #fff6c7 0%, #ffd65d 55%, #ffb938 100%);
    border-radius:999px;
}
.gold-star::before{ width:4px; height:100%; }
.gold-star::after{ width:100%; height:4px; }
.gold-star.sm{
    width:10px;
    height:10px;
    opacity:.86;
    filter:
        drop-shadow(0 0 3px rgba(255,226,112,.7))
        drop-shadow(0 0 6px rgba(255,201,74,.34));
}
@keyframes starBlink{
    0%,100%{
        opacity:.64;
        filter:
            drop-shadow(0 0 2px rgba(255,226,112,.38))
            drop-shadow(0 0 4px rgba(255,201,74,.18));
    }
    18%{
        opacity:.92;
        filter:
            drop-shadow(0 0 4px rgba(255,226,112,.76))
            drop-shadow(0 0 7px rgba(255,201,74,.38));
    }
    48%{
        opacity:1;
        filter:
            drop-shadow(0 0 6px rgba(255,233,132,.92))
            drop-shadow(0 0 12px rgba(255,193,61,.58));
    }
    78%{
        opacity:.78;
        filter:
            drop-shadow(0 0 3px rgba(255,226,112,.44))
            drop-shadow(0 0 6px rgba(255,201,74,.22));
    }
}
@keyframes starFloat{
    0%{ transform:translate(-50%, -50%) translate(0, 0) scale(var(--scale,1)); }
    33%{ transform:translate(-50%, -50%) translate(var(--mx1,1px), var(--my1,-1px)) scale(calc(var(--scale,1) * 1.03)); }
    66%{ transform:translate(-50%, -50%) translate(var(--mx2,-1px), var(--my2,1px)) scale(calc(var(--scale,1) * .98)); }
    100%{ transform:translate(-50%, -50%) translate(var(--mx3,0px), var(--my3,0px)) scale(var(--scale,1)); }
}
.gold-orbit{
    position:absolute;
    inset:-12%;
    border-radius:28px;
    pointer-events:none;
}
.gold-comet{
    position:absolute;
    width:62px;
    height:6px;
    border-radius:999px;
    left:50%;
    top:50%;
    margin-left:-31px;
    margin-top:-3px;
    background:linear-gradient(90deg, rgba(255,210,92,0) 0%, rgba(255,229,150,.18) 18%, rgba(255,244,205,.98) 60%, rgba(255,198,56,.92) 100%);
    box-shadow:
        0 0 10px rgba(255,222,110,.68),
        0 0 22px rgba(255,191,63,.42);
    transform-origin:31px 98px;
    animation:goldOrbit 3.8s linear infinite;
    opacity:.98;
}
.gold-comet:nth-child(2){ animation-delay:-1.25s; }
.gold-comet:nth-child(3){ animation-delay:-2.5s; }
@keyframes goldOrbit{
    0%{ transform:rotate(0deg) translateY(-98px) rotate(8deg); opacity:.94; }
    50%{ opacity:1; }
    100%{ transform:rotate(360deg) translateY(-98px) rotate(8deg); opacity:.94; }
}

.overlay-sub{
    font-size:14px;
    color:#8189ac;
    text-align:center;
    line-height:1.45;
}
.win-result-badge,
.overlay-badge{
    min-height:42px;
    padding:10px 14px;
    border-radius:14px;
    background:linear-gradient(180deg, rgba(189,180,238,.98), rgba(164,147,228,.98));
    color:#fff;
    font-size:14px;
    font-weight:900;
    letter-spacing:.2px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    box-shadow:
        0 10px 20px rgba(101,94,170,.16),
        inset 0 1px 0 rgba(255,255,255,.26);
}
.tile-result-badge{
    background:linear-gradient(180deg, rgba(193,185,240,.98), rgba(169,156,229,.98));
}
.gameover-tight{ margin-top:2px; }
.gameover-extra-note{ min-height:36px; font-size:13px; }
.is-hidden{ display:none !important; }
.overlay-msg{
    font-size:14px;
    color:#7d84a8;
    text-align:center;
    line-height:1.55;
}
.overlay-buttons{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:10px;
}
.overlay-buttons button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:13px 14px;
    font-size:14px;
    font-weight:900;
    letter-spacing:.2px;
    color:#ffffff;
    background:linear-gradient(180deg, #e195be 0%, #d970a6 100%);
    box-shadow:
        0 10px 18px rgba(217,112,166,.22),
        inset 0 1px 0 rgba(255,255,255,.28);
    cursor:pointer;
    transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
}
.overlay-buttons button:hover{ filter:brightness(1.03); }
.overlay-buttons button:active{ transform:scale(.992); }

.preload-stage{
    position:fixed;
    left:-99999px;
    top:-99999px;
    width:1px;
    height:1px;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
}
.preload-stage img{
    display:block;
    width:1px;
    height:1px;
}

@media (max-width:420px){
    body{ padding:14px 0 22px; }
    .top-panel{ gap:10px; }
    .score-card{
        min-height:68px;
        padding:11px 12px;
    }
    .score-value{ font-size:24px; }
}
</style>
</head>
<body>
<div id="app">
    <div class="version-note">KEY 2048 v1</div>
    <div id="loading-note" class="loading-note">이미지 준비 중...</div>
    <div id="debug-indicator" class="debug-indicator">DEBUG MODE</div>

    <button id="title-banner" class="title-banner" aria-label="Restart"></button>
    <div class="banner-desc">상하좌우로 밀어 같은 숫자를 합쳐 2048을 만들어보세요!</div>

    <div class="top-panel">
        <div id="score-card" class="score-card">
            <div class="score-label">SCORE</div>
            <div id="score" class="score-value">0</div>
        </div>
        <div id="best-card" class="score-card">
            <div class="score-label">BEST</div>
            <div id="best" class="score-value">0</div>
        </div>
    </div>

    <div class="game-board-wrap">
        <div id="milestone-wrap" class="milestone-wrap"></div>

        <div id="board" class="board">
            <div id="bg" class="grid"></div>
            <div id="tiles" class="tiles"></div>
            <div id="anim-layer" class="anim-layer"></div>
        </div>

        <div id="winoverlay" class="overlay">
            <div class="overlay-card">
                <div id="win-img" class="overlay-img">
                    <div class="gold-stars">
                        <span class="gold-star" style="--x:12%; --y:10%;"></span>
                        <span class="gold-star" style="--x:50%; --y:4%; --scale:.82;"></span>
                        <span class="gold-star" style="--x:88%; --y:12%; --scale:1.18;"></span>
                        <span class="gold-star" style="--x:6%; --y:50%; --scale:1.02;"></span>
                        <span class="gold-star" style="--x:94%; --y:54%; --scale:.76;"></span>
                        <span class="gold-star" style="--x:14%; --y:90%; --scale:.92;"></span>
                        <span class="gold-star" style="--x:50%; --y:96%; --scale:1.22;"></span>
                        <span class="gold-star" style="--x:88%; --y:90%; --scale:1.08;"></span>
                    </div>
                    <div class="gold-orbit">
                        <span class="gold-comet"></span>
                        <span class="gold-comet"></span>
                        <span class="gold-comet"></span>
                    </div>
                </div>
                <div class="overlay-pretitle">축하해요!</div>
                <div id="win-result-badge" class="win-result-badge">2048 타일을 완성했어요!</div>
                <div id="win-tile-label" class="overlay-sub"></div>
                <div class="overlay-buttons">
                    <button onclick="restart()">더 높은 점수에 도전하시겠어요?</button>
                </div>
            </div>
        </div>

        <div id="gameover" class="overlay">
            <div class="overlay-card">
                <div id="gameover-img" class="overlay-img">
                    <div class="gold-stars">
                        <span class="gold-star" style="--x:12%; --y:10%;"></span>
                        <span class="gold-star" style="--x:50%; --y:4%; --scale:.82;"></span>
                        <span class="gold-star" style="--x:88%; --y:12%; --scale:1.18;"></span>
                        <span class="gold-star" style="--x:6%; --y:50%; --scale:1.02;"></span>
                        <span class="gold-star" style="--x:94%; --y:54%; --scale:.76;"></span>
                        <span class="gold-star" style="--x:14%; --y:90%; --scale:.92;"></span>
                        <span class="gold-star" style="--x:50%; --y:96%; --scale:1.22;"></span>
                        <span class="gold-star" style="--x:88%; --y:90%; --scale:1.08;"></span>
                    </div>
                    <div class="gold-orbit">
                        <span class="gold-comet"></span>
                        <span class="gold-comet"></span>
                        <span class="gold-comet"></span>
                    </div>
                </div>
                <div id="gameover-tile-badge" class="overlay-badge tile-result-badge gameover-tight is-hidden"></div>
                <div id="gameover-msg" class="overlay-msg">거의 다 왔어요. 다음 번엔 2048까지!</div>
                <div id="gameover-badge" class="overlay-badge gameover-extra-note is-hidden"></div>
                <div class="overlay-buttons gameover-replay">
                    <button onclick="restart()">다시 도전하시겠어요?</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="preload-stage" class="preload-stage" aria-hidden="true"></div>

<script>
const SIZE = 4;
const GAP = 10;
const MOVE_MS = 240;
const MOVE_MS_STEP = 28;
const MOVE_MS_MAX = 296;

const PRELOAD_TILE_VALUES = [2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048];
const PRELOAD_IMAGES = [
    "./images/img_title.jpg",
    ...PRELOAD_TILE_VALUES.map(v => `./images/img_${v}.jpg`)
];

const imageCache = new Map();

let board = [];
let score = 0;
let best = Number(localStorage.getItem("bestScore") || 0);
let wonShown = false;
let moving = false;
let debugMode = false;

let cellWidth = 0;
let cellHeight = 0;

let lastSpawn = null;
let mergeCells = [];

let startX = 0;
let startY = 0;
let trackingTouch = false;

let achievedMilestones = new Set();
let bestJustUpdated = false;

const MILESTONE_VALUES = [128, 256, 512, 1024, 2048];

const loadingNoteEl = document.getElementById("loading-note");
const debugIndicatorEl = document.getElementById("debug-indicator");
const milestoneWrapEl = document.getElementById("milestone-wrap");
const boardEl = document.getElementById("board");
const tilesEl = document.getElementById("tiles");
const animLayer = document.getElementById("anim-layer");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const bg = document.getElementById("bg");
const winOverlay = document.getElementById("winoverlay");
const gameOverOverlay = document.getElementById("gameover");
const winImg = document.getElementById("win-img");
const gameOverImg = document.getElementById("gameover-img");
const winTileLabel = document.getElementById("win-tile-label");
const winResultBadge = document.getElementById("win-result-badge");
const gameOverTileBadge = document.getElementById("gameover-tile-badge");
const gameOverMsg = document.getElementById("gameover-msg");
const gameOverBadge = document.getElementById("gameover-badge");
const titleBannerEl = document.getElementById("title-banner");
const preloadStageEl = document.getElementById("preload-stage");

bestEl.innerText = String(best);

function updateDebugIndicator(){
    debugIndicatorEl.classList.toggle("show", debugMode);
}

function toggleDebugMode(){
    debugMode = !debugMode;
    updateDebugIndicator();
    showMilestone(debugMode ? "디버그 모드 ON" : "디버그 모드 OFF");
}

function forceWinOverlay(){
    hideOverlays();
    wonShown = true;
    showWin();
}

function forceGameOverOverlay(){
    hideOverlays();
    showGameOver();
}

function buildTileImageSrc(value){
    return `./images/img_${value}.jpg`;
}

function getSafeTileValue(value){
    return PRELOAD_TILE_VALUES.includes(value) ? value : 2;
}

function getTileImageSrc(value){
    const safeValue = getSafeTileValue(value);
    const src = buildTileImageSrc(safeValue);
    return imageCache.get(src)?.src || src;
}

function preloadSingleImage(src){
    return new Promise(resolve => {
        const img = new Image();
        img.decoding = "async";

        img.onload = async () => {
            try{
                if(typeof img.decode === "function"){
                    await img.decode();
                }
            }catch(_e){}
            imageCache.set(src, img);
            resolve();
        };

        img.onerror = () => {
            resolve();
        };

        img.src = src;
    });
}

async function preloadImages(srcList){
    loadingNoteEl.classList.add("show");

    for(const src of srcList){
        await preloadSingleImage(src);
    }

    preloadStageEl.innerHTML = "";
    srcList.forEach(src => {
        const cached = imageCache.get(src);
        if(!cached) return;
        const domImg = document.createElement("img");
        domImg.alt = "";
        domImg.src = cached.src;
        preloadStageEl.appendChild(domImg);
    });

    loadingNoteEl.classList.remove("show");
}

function emptyBoard(){
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
}

function calculateLayout(){
    const width = tilesEl.clientWidth;
    const height = tilesEl.clientHeight;

    if(width <= 0 || height <= 0){
        requestAnimationFrame(calculateLayout);
        return;
    }

    cellWidth = (width - GAP * (SIZE - 1)) / SIZE;
    cellHeight = (height - GAP * (SIZE - 1)) / SIZE;
    renderBoard();
}

function pos(r, c){
    return {
        top: (cellHeight + GAP) * r,
        left: (cellWidth + GAP) * c
    };
}

function hideOverlays(){
    winOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";
}

function setBadge(el, text){
    if(text){
        el.textContent = text;
        el.classList.remove("is-hidden");
    }else{
        el.textContent = "";
        el.classList.add("is-hidden");
    }
}

function getGameOverMessageByMax(max){
    if(max >= 1024) return "거의 다 왔어요. 다음 번엔 2048까지!";
    if(max >= 512) return "좋아요! 다음 판엔 더 크게 갈 수 있어요.";
    if(max >= 256) return "흐름이 좋아요. 다음 판이 더 기대돼요.";
    return "조금만 더 익숙해지면 금방 올라가요.";
}

function getGameOverBadgeText(max){
    if(bestJustUpdated) return "NEW BEST!";
    if(max >= 1024) return "첫 1024 달성!";
    if(max >= 512) return "512 달성!";
    return "";
}

function showWin(){
    winImg.style.backgroundImage = `url('${getTileImageSrc(2048)}')`;
    winResultBadge.textContent = "2048 타일을 완성했어요!";
    winTileLabel.textContent = "";
    winOverlay.style.display = "flex";
}

function showGameOver(){
    const max = getMaxTile() || 2;
    const safeImgValue = getSafeTileValue(max);
    gameOverImg.style.backgroundImage = `url('${getTileImageSrc(safeImgValue)}')`;
    gameOverMsg.textContent = getGameOverMessageByMax(max);
    setBadge(gameOverTileBadge, `${max} 타일을 완성했어요!`);
    setBadge(gameOverBadge, getGameOverBadgeText(max));
    gameOverOverlay.style.display = "flex";
}

function appendTileNumberBadge(el, value){
    const badge = document.createElement("div");
    badge.className = "tile-badge";
    badge.textContent = value;
    el.appendChild(badge);
}

function getEmptyCells(){
    const out = [];
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) out.push({ r, c });
        }
    }
    return out;
}

function spawn(forceValue){
    const empties = getEmptyCells();
    if(!empties.length) return false;

    const pick = empties[Math.floor(Math.random() * empties.length)];
    const value = forceValue || (Math.random() < 0.9 ? 2 : 4);

    board[pick.r][pick.c] = value;
    lastSpawn = { r: pick.r, c: pick.c };
    return true;
}

function showMilestone(text){
    milestoneWrapEl.innerHTML = "";
    const el = document.createElement("div");
    el.className = "milestone";
    el.textContent = text;
    milestoneWrapEl.appendChild(el);

    setTimeout(() => {
        if(el.parentNode === milestoneWrapEl){
            milestoneWrapEl.removeChild(el);
        }
    }, 1100);
}

function getMaxTile(){
    let max = 0;
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] > max) max = board[r][c];
        }
    }
    return max;
}

function has2048Tile(){
    return getMaxTile() >= 2048;
}

function updateScore(){
    scoreEl.innerText = String(score);

    if(score > best){
        best = score;
        bestJustUpdated = true;
        localStorage.setItem("bestScore", String(best));
    }else{
        bestJustUpdated = false;
    }

    bestEl.innerText = String(best);
}

function linesEqual(a, b){
    if(a.length !== b.length) return false;
    for(let i = 0; i < a.length; i++){
        if(a[i] !== b[i]) return false;
    }
    return true;
}

function slideAndMergeLineDetailed(line){
    const filtered = [];
    for(let i = 0; i < line.length; i++){
        if(line[i] !== 0){
            filtered.push({
                value: line[i],
                from: i
            });
        }
    }

    const out = [];
    const moves = [];
    const merges = [];
    let gained = 0;

    let target = 0;
    for(let i = 0; i < filtered.length; i++){
        const cur = filtered[i];
        const next = filtered[i + 1];

        if(next && next.value === cur.value){
            const mergedValue = cur.value * 2;
            out.push(mergedValue);
            gained += mergedValue;

            moves.push({ from: cur.from, to: target, value: cur.value, merged: true, fadeLate: false });
            moves.push({ from: next.from, to: target, value: next.value, merged: true, fadeLate: true });

            merges.push({ index: target, value: mergedValue });

            target++;
            i++;
        }else{
            out.push(cur.value);
            moves.push({ from: cur.from, to: target, value: cur.value, merged: false, fadeLate: false });
            target++;
        }
    }

    while(out.length < SIZE) out.push(0);

    return { line: out, gained, moves, merges };
}

function buildMoveResult(dir){
    const oldBoard = board.map(row => [...row]);
    const newBoard = emptyBoard();
    const animations = [];
    const mergedCellsOut = [];
    let moved = false;
    let gainedTotal = 0;

    if(dir === "ArrowLeft" || dir === "ArrowRight"){
        for(let r = 0; r < SIZE; r++){
            const original = [...oldBoard[r]];
            const working = dir === "ArrowLeft" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalLine = dir === "ArrowLeft" ? res.line : [...res.line].reverse();

            newBoard[r] = finalLine;
            gainedTotal += res.gained;

            if(!linesEqual(original, finalLine)) moved = true;

            res.moves.forEach(m => {
                const fromC = dir === "ArrowLeft" ? m.from : (SIZE - 1 - m.from);
                const toC = dir === "ArrowLeft" ? m.to : (SIZE - 1 - m.to);
                animations.push({
                    fromR: r, fromC, toR: r, toC,
                    value: m.value, merged: m.merged, fadeLate: m.fadeLate
                });
            });

            res.merges.forEach(m => {
                const c = dir === "ArrowLeft" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }else{
        for(let c = 0; c < SIZE; c++){
            const original = [];
            for(let r = 0; r < SIZE; r++) original.push(oldBoard[r][c]);

            const working = dir === "ArrowUp" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalCol = dir === "ArrowUp" ? res.line : [...res.line].reverse();

            for(let r = 0; r < SIZE; r++) newBoard[r][c] = finalCol[r];
            gainedTotal += res.gained;

            if(!linesEqual(original, finalCol)) moved = true;

            res.moves.forEach(m => {
                const fromR = dir === "ArrowUp" ? m.from : (SIZE - 1 - m.from);
                const toR = dir === "ArrowUp" ? m.to : (SIZE - 1 - m.to);
                animations.push({
                    fromR, fromC: c, toR, toC: c,
                    value: m.value, merged: m.merged, fadeLate: m.fadeLate
                });
            });

            res.merges.forEach(m => {
                const r = dir === "ArrowUp" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }

    return { newBoard, animations, mergeCells: mergedCellsOut, gained: gainedTotal, moved };
}

function getMoveDuration(fromR, fromC, toR, toC){
    const steps = Math.max(Math.abs(toR - fromR), Math.abs(toC - fromC));
    return Math.min(MOVE_MS_MAX, MOVE_MS + Math.max(0, steps - 1) * MOVE_MS_STEP);
}

function renderBoard(){
    if(cellWidth <= 0 || cellHeight <= 0) return;

    tilesEl.innerHTML = "";

    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            const value = board[r][c];
            if(!value) continue;

            const tile = document.createElement("div");
            tile.className = "tile";
            tile.style.width = cellWidth + "px";
            tile.style.height = cellHeight + "px";

            const p = pos(r, c);
            tile.style.top = p.top + "px";
            tile.style.left = p.left + "px";
            tile.style.backgroundImage = `url('${getTileImageSrc(value)}')`;

            if(lastSpawn && lastSpawn.r === r && lastSpawn.c === c){
                tile.classList.add("spawn");
            }

            if(mergeCells.some(m => m.r === r && m.c === c)){
                tile.classList.add("merge-pop");
            }

            appendTileNumberBadge(tile, value);
            tilesEl.appendChild(tile);
        }
    }
}

function createAnimTile(value, r, c){
    const el = document.createElement("div");
    el.className = "anim-tile";
    el.style.width = cellWidth + "px";
    el.style.height = cellHeight + "px";

    const p = pos(r, c);
    el.style.top = p.top + "px";
    el.style.left = p.left + "px";
    el.style.backgroundImage = `url('${getTileImageSrc(value)}')`;
    el.style.transform = "translate3d(0,0,0)";

    appendTileNumberBadge(el, value);
    animLayer.appendChild(el);
    return el;
}

function playMoveAnimation(animations, onDone){
    animLayer.innerHTML = "";

    if(animations.length === 0){
        onDone();
        return;
    }

    const animTiles = animations.map(a => {
        const el = createAnimTile(a.value, a.fromR, a.fromC);
        const duration = getMoveDuration(a.fromR, a.fromC, a.toR, a.toC);
        el.style.setProperty("--moveDur", duration + "ms");
        return { el, duration, ...a };
    });

    const maxDuration = Math.max(...animTiles.map(a => a.duration));
    tilesEl.style.visibility = "hidden";

    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            animTiles.forEach(a => {
                const from = pos(a.fromR, a.fromC);
                const to = pos(a.toR, a.toC);
                const dx = to.left - from.left;
                const dy = to.top - from.top;
                a.el.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;

                if(a.merged){
                    a.el.style.filter = "brightness(1.04)";
                }
            });
        });
    });

    animTiles.forEach(a => {
        if(a.merged){
            setTimeout(() => {
                a.el.style.opacity = a.fadeLate ? "0" : "0.18";
                a.el.style.filter = "brightness(1.10)";
            }, Math.max(80, a.duration - 26));
        }
    });

    setTimeout(() => {
        animLayer.innerHTML = "";
        onDone();
    }, maxDuration + 28);
}

function move(dir){
    if(moving) return;
    if(winOverlay.style.display === "flex") return;
    if(gameOverOverlay.style.display === "flex") return;
    if(cellWidth <= 0 || cellHeight <= 0) return;

    moving = true;
    lastSpawn = null;
    mergeCells = [];

    const res = buildMoveResult(dir);

    if(!res.moved){
        moving = false;
        return;
    }

    score += res.gained;
    updateScore();

    playMoveAnimation(res.animations, () => {
        board = res.newBoard;
        mergeCells = res.mergeCells;

        spawn();
        renderBoard();
        tilesEl.style.visibility = "visible";

        checkMilestonesFromBoard();

        setTimeout(() => {
            mergeCells = [];
            lastSpawn = null;
            renderBoard();
        }, 260);

        if(!wonShown && has2048Tile()){
            wonShown = true;
            showWin();
        }else if(isGameOver()){
            showGameOver();
        }

        moving = false;
    });
}

function restart(){
    hideOverlays();
    animLayer.innerHTML = "";
    tilesEl.style.visibility = "visible";
    milestoneWrapEl.innerHTML = "";

    setBadge(gameOverTileBadge, "");
    setBadge(gameOverBadge, "");

    board = emptyBoard();
    score = 0;
    wonShown = false;
    moving = false;
    lastSpawn = null;
    mergeCells = [];
    trackingTouch = false;
    achievedMilestones = new Set();
    bestJustUpdated = false;

    scoreEl.innerText = "0";
    bestEl.innerText = String(best);

    spawn(2);
    spawn(2);
    renderBoard();
}

function checkMilestonesFromBoard(){
    const max = getMaxTile();
    for(const milestone of MILESTONE_VALUES){
        if(max >= milestone && !achievedMilestones.has(milestone)){
            achievedMilestones.add(milestone);
            showMilestone(`${milestone} 달성!`);
        }
    }
}

function isGameOver(){
    if(getEmptyCells().length) return false;

    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            const v = board[r][c];
            if(r + 1 < SIZE && board[r + 1][c] === v) return false;
            if(c + 1 < SIZE && board[r][c + 1] === v) return false;
        }
    }
    return true;
}

window.addEventListener("keydown", e => {
    if(e.shiftKey && (e.key === "D" || e.key === "d")){
        e.preventDefault();
        toggleDebugMode();
        return;
    }
    if(e.shiftKey && (e.key === "W" || e.key === "w")){
        e.preventDefault();
        if(debugMode) forceWinOverlay();
        return;
    }
    if(e.shiftKey && (e.key === "G" || e.key === "g")){
        e.preventDefault();
        if(debugMode) forceGameOverOverlay();
        return;
    }
    if(e.key === "Escape"){
        hideOverlays();
        return;
    }
    if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
        e.preventDefault();
        move(e.key);
    }
});

boardEl.addEventListener("touchstart", e => {
    if(e.touches.length !== 1){
        trackingTouch = false;
        e.preventDefault();
        return;
    }
    trackingTouch = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, { passive:false });

boardEl.addEventListener("touchmove", e => {
    e.preventDefault();
    if(e.touches.length > 1){
        trackingTouch = false;
    }
}, { passive:false });

boardEl.addEventListener("touchend", e => {
    if(!trackingTouch) return;
    if(e.changedTouches.length !== 1) return;

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    trackingTouch = false;

    if(Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;

    if(Math.abs(dx) > Math.abs(dy)){
        move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    }else{
        move(dy > 0 ? "ArrowDown" : "ArrowUp");
    }
}, { passive:true });

boardEl.addEventListener("touchcancel", () => {
    trackingTouch = false;
}, { passive:true });

titleBannerEl.addEventListener("click", restart);

function init(){
    if(bg.children.length === 0){
        for(let i = 0; i < 16; i++){
            const d = document.createElement("div");
            d.className = "cell";
            bg.appendChild(d);
        }
    }

    board = emptyBoard();
    updateDebugIndicator();
    achievedMilestones = new Set();
    bestJustUpdated = false;

    spawn(2);
    spawn(2);

    requestAnimationFrame(() => {
        calculateLayout();
    });

    window.addEventListener("resize", calculateLayout);
}

init();
preloadImages(PRELOAD_IMAGES);
</script>
