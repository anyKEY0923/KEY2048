<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
body{
    margin:0;
    background:#faf8ef;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    touch-action:none;
}
h2{
    margin-bottom:10px;
}
#board{
    position:relative;
    width:min(92vw,420px);
    height:min(92vw,420px);
    background:#bbada0;
    padding:10px;
    border-radius:6px;
    box-sizing:border-box;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:10px;
    height:100%;
}
.cell{
    background:rgba(238,228,218,.35);
    border-radius:3px;
}
#tiles{
    position:absolute;
    inset:10px;
    pointer-events:none;
}
.tile{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    background-size:cover;
    background-position:center;
    transition:top .12s ease, left .12s ease, transform .12s ease;
}
.tile-new{
    transform:scale(0);
    animation:popIn .12s ease forwards;
}
@keyframes popIn{
    from{ transform:scale(0); }
    to{ transform:scale(1); }
}
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.65);
    color:white;
    z-index:10;
}
.overlay-img{
    width:180px;
    height:180px;
    background-size:cover;
    background-position:center;
    border-radius:8px;
    margin-bottom:20px;
}
.overlay-title{
    margin-bottom:15px;
    font-size:22px;
    font-weight:bold;
}
.overlay-buttons{
    display:flex;
    gap:10px;
}
.overlay button{
    padding:12px 26px;
    font-size:18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<div style="font-size:12px; color:#888; margin-bottom:6px;">
v1.8.0 수정 : 상태 꼬임 방지를 위해 숫자 보드 기반으로 전체 구조 재작성, SHIFT+W WIN 테스트 추가
</div>

<h2>
Score <span id="score">0</span>
&nbsp;&nbsp;
Best <span id="best">0</span>
</h2>

<div id="board">
    <div class="grid" id="bg"></div>
    <div id="tiles"></div>

    <div id="winoverlay" class="overlay">
        <div id="win-img" class="overlay-img"></div>
        <div class="overlay-title">YOU WIN</div>
        <div class="overlay-buttons">
            <button onclick="restart()">REPLAY</button>
        </div>
    </div>

    <div id="gameover" class="overlay">
        <div id="gameover-img" class="overlay-img"></div>
        <div class="overlay-title">GAME OVER</div>
        <div class="overlay-buttons">
            <button onclick="restart()">REPLAY</button>
        </div>
    </div>
</div>

<script>
const SIZE = 4;
const GAP = 10;

let board = [];
let score = 0;
let best = Number(localStorage.getItem("bestScore") || 0);
let wonShown = false;
let moving = false;
let cellSize = 0;
let lastSpawn = null;

const tilesEl = document.getElementById("tiles");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const boardEl = document.getElementById("board");
const bg = document.getElementById("bg");
const winOverlay = document.getElementById("winoverlay");
const gameOverOverlay = document.getElementById("gameover");
const winImg = document.getElementById("win-img");
const gameOverImg = document.getElementById("gameover-img");

bestEl.innerText = String(best);

function emptyBoard(){
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
}

function calculateLayout(){
    const size = boardEl.clientWidth;
    cellSize = (size - GAP * 5) / 4;
    renderBoard();
}

function pos(r, c){
    return {
        top: (cellSize + GAP) * r,
        left: (cellSize + GAP) * c
    };
}

function hideOverlays(){
    winOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";
}

function showWin(){
    winImg.style.backgroundImage = "url('./images/img_2048.jpg')";
    winOverlay.style.display = "flex";
}

function showGameOver(){
    const max = getMaxTile() || 2;
    gameOverImg.style.backgroundImage = `url('./images/img_${max}.jpg')`;
    gameOverOverlay.style.display = "flex";
}

function getMaxTile(){
    let max = 0;
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] > max) max = board[r][c];
        }
    }
    return max;
}

function updateScore(){
    scoreEl.innerText = String(score);
    if(score > best){
        best = score;
        localStorage.setItem("bestScore", String(best));
        bestEl.innerText = String(best);
    }
}

function renderBoard(){
    if(!cellSize) return;

    tilesEl.innerHTML = "";

    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            const value = board[r][c];
            if(!value) continue;

            const tile = document.createElement("div");
            tile.className = "tile";
            tile.style.width = cellSize + "px";
            tile.style.height = cellSize + "px";

            const p = pos(r, c);
            tile.style.top = p.top + "px";
            tile.style.left = p.left + "px";
            tile.style.backgroundImage = `url('./images/img_${value}.jpg')`;

            if(lastSpawn && lastSpawn.r === r && lastSpawn.c === c){
                tile.classList.add("tile-new");
            }

            tilesEl.appendChild(tile);
        }
    }
}

function getEmptyCells(){
    const empty = [];
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) empty.push({ r, c });
        }
    }
    return empty;
}

function spawn(){
    const empty = getEmptyCells();
    if(empty.length === 0){
        lastSpawn = null;
        return;
    }

    const pick = empty[Math.floor(Math.random() * empty.length)];
    board[pick.r][pick.c] = Math.random() < 0.9 ? 2 : 4;
    lastSpawn = { r: pick.r, c: pick.c };
}

function has2048Tile(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] >= 2048) return true;
        }
    }
    return false;
}

function isGameOver(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) return false;
            if(c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
            if(r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
        }
    }
    return true;
}

function slideAndMergeLine(line){
    const nums = line.filter(v => v !== 0);
    let gained = 0;

    for(let i = 0; i < nums.length - 1; i++){
        if(nums[i] === nums[i + 1]){
            nums[i] *= 2;
            gained += nums[i];
            nums[i + 1] = 0;
            i++;
        }
    }

    const merged = nums.filter(v => v !== 0);
    while(merged.length < SIZE) merged.push(0);

    return {
        line: merged,
        gained
    };
}

function linesEqual(a, b){
    for(let i = 0; i < a.length; i++){
        if(a[i] !== b[i]) return false;
    }
    return true;
}

function moveLeft(){
    let moved = false;
    let gainedTotal = 0;

    for(let r = 0; r < SIZE; r++){
        const original = [...board[r]];
        const result = slideAndMergeLine(original);
        board[r] = result.line;
        gainedTotal += result.gained;
        if(!linesEqual(original, result.line)) moved = true;
    }

    score += gainedTotal;
    return moved;
}

function moveRight(){
    let moved = false;
    let gainedTotal = 0;

    for(let r = 0; r < SIZE; r++){
        const original = [...board[r]];
        const reversed = [...original].reverse();
        const result = slideAndMergeLine(reversed);
        const finalLine = result.line.reverse();

        board[r] = finalLine;
        gainedTotal += result.gained;
        if(!linesEqual(original, finalLine)) moved = true;
    }

    score += gainedTotal;
    return moved;
}

function getColumn(c){
    const col = [];
    for(let r = 0; r < SIZE; r++) col.push(board[r][c]);
    return col;
}

function setColumn(c, col){
    for(let r = 0; r < SIZE; r++) board[r][c] = col[r];
}

function moveUp(){
    let moved = false;
    let gainedTotal = 0;

    for(let c = 0; c < SIZE; c++){
        const original = getColumn(c);
        const result = slideAndMergeLine(original);
        setColumn(c, result.line);

        gainedTotal += result.gained;
        if(!linesEqual(original, result.line)) moved = true;
    }

    score += gainedTotal;
    return moved;
}

function moveDown(){
    let moved = false;
    let gainedTotal = 0;

    for(let c = 0; c < SIZE; c++){
        const original = getColumn(c);
        const reversed = [...original].reverse();
        const result = slideAndMergeLine(reversed);
        const finalCol = result.line.reverse();

        setColumn(c, finalCol);
        gainedTotal += result.gained;
        if(!linesEqual(original, finalCol)) moved = true;
    }

    score += gainedTotal;
    return moved;
}

function move(dir){
    if(moving) return;
    if(winOverlay.style.display === "flex") return;
    if(gameOverOverlay.style.display === "flex") return;

    moving = true;
    lastSpawn = null;

    let moved = false;

    if(dir === "ArrowLeft") moved = moveLeft();
    else if(dir === "ArrowRight") moved = moveRight();
    else if(dir === "ArrowUp") moved = moveUp();
    else if(dir === "ArrowDown") moved = moveDown();

    if(!moved){
        moving = false;
        return;
    }

    updateScore();
    spawn();
    renderBoard();

    if(!wonShown && has2048Tile()){
        wonShown = true;
        showWin();
    } else if(isGameOver()){
        showGameOver();
    }

    moving = false;
}

function restart(){
    hideOverlays();
    board = emptyBoard();
    score = 0;
    wonShown = false;
    moving = false;
    lastSpawn = null;

    scoreEl.innerText = "0";
    bestEl.innerText = String(best);

    spawn();
    spawn();
    renderBoard();
}

window.addEventListener("keydown", e => {
    if(e.shiftKey && (e.key === "W" || e.key === "w")){
        e.preventDefault();
        if(winOverlay.style.display === "flex"){
            hideOverlays();
        }else{
            showWin();
        }
        return;
    }

    if(e.key === "Escape"){
        hideOverlays();
        return;
    }

    if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
        e.preventDefault();
        move(e.key);
    }
});

let startX = 0;
let startY = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, { passive:true });

document.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    if(Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;

    if(Math.abs(dx) > Math.abs(dy)){
        move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    }else{
        move(dy > 0 ? "ArrowDown" : "ArrowUp");
    }
}, { passive:true });

function init(){
    for(let i = 0; i < 16; i++){
        const d = document.createElement("div");
        d.className = "cell";
        bg.appendChild(d);
    }

    board = emptyBoard();
    updateScore();
    spawn();
    spawn();
    calculateLayout();
    window.addEventListener("resize", calculateLayout);
}

init();
</script>
</body>
</html>
