<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>

body{
margin:0;
background:#faf8ef;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
touch-action:none;
}

h2{
margin-bottom:10px;
}

#board{
position:relative;
width:min(92vw,420px);
height:min(92vw,420px);
background:#bbada0;
padding:10px;
border-radius:6px;
box-sizing:border-box;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-template-rows:repeat(4,1fr);
gap:10px;
height:100%;
}

.cell{
background:rgba(238,228,218,.35);
border-radius:3px;
}

.tile{
position:absolute;
display:flex;
align-items:center;
justify-content:center;
border-radius:4px;
background-size:cover;
background-position:center;
transition:top .15s,left .15s;
}

.tile-merge{
animation:merge .18s;
}

@keyframes merge{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<h2>
Score <span id="score">0</span>
&nbsp;&nbsp;
Best <span id="best">0</span>
</h2>

<div id="board">

<div class="grid" id="bg"></div>
<div id="tiles"></div>

</div>

<script>

const SIZE=4

let tiles=[]
let board=[]
let score=0
let best=localStorage.getItem("bestScore")||0
let idCounter=0
let moving=false

let cellSize
let gap=10

const tileLayer=document.getElementById("tiles")
const scoreEl=document.getElementById("score")
const bestEl=document.getElementById("best")
const boardEl=document.getElementById("board")

bestEl.innerText=best

function calculateLayout(){

let size=boardEl.clientWidth

cellSize=(size-gap*5)/4

tiles.forEach(t=>{
t.el.style.width=cellSize+"px"
t.el.style.height=cellSize+"px"
updateTile(t)
})

}

function pos(r,c){

return{
top:gap+(cellSize+gap)*r,
left:gap+(cellSize+gap)*c
}

}

function createTile(value,r,c){

let el=document.createElement("div")

el.className="tile"
el.style.width=cellSize+"px"
el.style.height=cellSize+"px"
el.style.backgroundImage=`url('./images/img_${value}.jpg')`

tileLayer.appendChild(el)

let tile={
id:idCounter++,
value,
r,
c,
el,
merged:false
}

tiles.push(tile)

updateTile(tile)

}

function updateTile(tile){

let p=pos(tile.r,tile.c)

tile.el.style.top=p.top+"px"
tile.el.style.left=p.left+"px"

tile.el.style.backgroundImage=`url('./images/img_${tile.value}.jpg')`

tile.el.className="tile"

if(tile.merged){
tile.el.classList.add("tile-merge")
tile.merged=false
}

}

function rebuildBoard(){

board=Array(SIZE).fill().map(()=>Array(SIZE).fill(null))

tiles.forEach(t=>{
board[t.r][t.c]=t
})

}

function spawn(){

rebuildBoard()

let empty=[]

for(let r=0;r<SIZE;r++)
for(let c=0;c<SIZE;c++)
if(!board[r][c])
empty.push({r,c})

if(!empty.length) return

let {r,c}=empty[Math.floor(Math.random()*empty.length)]

createTile(Math.random()<0.9?2:4,r,c)

}

function move(dir){

if(moving) return
moving=true

rebuildBoard()

let moved=false

let order=[0,1,2,3]

if(dir=="ArrowRight"||dir=="ArrowDown")
order=[3,2,1,0]

for(let r of order){
for(let c of order){

let tile=board[r][c]
if(!tile) continue

let nr=r
let nc=c

while(true){

let tr=nr
let tc=nc

if(dir=="ArrowLeft") tc--
if(dir=="ArrowRight") tc++
if(dir=="ArrowUp") tr--
if(dir=="ArrowDown") tr++

if(tr<0||tr>=SIZE||tc<0||tc>=SIZE) break

let target=board[tr][tc]

if(!target){

board[nr][nc]=null
nr=tr
nc=tc
board[nr][nc]=tile
moved=true

}else if(target.value==tile.value && !target.merged){

board[nr][nc]=null

target.value*=2
target.merged=true

score+=target.value

tile.el.remove()
tiles=tiles.filter(t=>t!=tile)

moved=true

break

}else break

}

tile.r=nr
tile.c=nc

}
}

tiles.forEach(updateTile)

scoreEl.innerText=score

if(score>best){
best=score
localStorage.setItem("bestScore",best)
bestEl.innerText=best
}

if(moved) spawn()

setTimeout(()=>moving=false,160)

}

window.addEventListener("keydown",e=>{
if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key))
move(e.key)
})

/* 모바일 스와이프 */

let startX=0
let startY=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
startY=e.touches[0].clientY
})

document.addEventListener("touchend",e=>{

let dx=e.changedTouches[0].clientX-startX
let dy=e.changedTouches[0].clientY-startY

let ax=Math.abs(dx)
let ay=Math.abs(dy)

if(Math.max(ax,ay)<30) return

if(ax>ay){
move(dx>0?"ArrowRight":"ArrowLeft")
}else{
move(dy>0?"ArrowDown":"ArrowUp")
}

})

function init(){

calculateLayout()

window.addEventListener("resize",calculateLayout)

board = Array(SIZE).fill().map(()=>Array(SIZE).fill(null))

for(let i=0;i<16;i++){
let d=document.createElement("div")
d.className="cell"
bg.appendChild(d)
}

spawn()
spawn()

}

init()

</script>
</body>
</html>
