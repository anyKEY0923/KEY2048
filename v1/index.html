<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root{
    --board-size:min(92vw,420px);

    --bg1:#f1f2fb;
    --bg2:#e4e8f6;

    --board:#c5cbe6;
    --board-dark:#adb6da;

    --panel1:#bdb4ee;
    --panel2:#a493e4;

    --panel-label:#f7f7ff;
    --panel-value:#ffffff;

    --text:#5a5f86;
    --sub:#747a9f;

    --gap:10px;

    --pad-x:10px;
    --pad-top:12px;
    --pad-bottom:10px;

    --tile-radius:8px;
}
*{ box-sizing:border-box; }

html, body{
    margin:0;
    min-height:100%;
}

html{
    overflow-x:hidden;
    overflow-y:auto;
}

body{
    background:
        radial-gradient(circle at top, #ffffff 0%, var(--bg1) 38%, var(--bg2) 100%);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    padding:18px 0 24px;
    color:var(--text);
    overflow-x:hidden;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
}

#app{
    width:var(--board-size);
    display:flex;
    flex-direction:column;
    align-items:stretch;
    position:relative;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    flex:0 0 auto;
}

.version-note{
    font-size:12px;
    color:#8a90b0;
    margin-bottom:8px;
    text-align:center;
}

.loading-note{
    display:none;
    margin-bottom:10px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(255,255,255,.66);
    color:#7d84a2;
    font-size:13px;
    text-align:center;
    box-shadow:
        0 6px 14px rgba(70,60,120,.04),
        inset 0 1px 0 rgba(255,255,255,.7);
}
.loading-note.show{
    display:block;
}

.debug-indicator{
    display:none;
    margin-bottom:8px;
    padding:7px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.84);
    color:#6f76bf;
    font-size:12px;
    font-weight:800;
    letter-spacing:.3px;
    text-align:center;
    box-shadow:
        0 6px 14px rgba(70,60,120,.08),
        inset 0 1px 0 rgba(255,255,255,.7);
}
.debug-indicator.show{
    display:block;
}

.milestone-wrap{
    position:absolute;
    top:36px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    pointer-events:none;
    z-index:300;
}
.milestone{
    padding:10px 16px;
    border-radius:999px;
    background:rgba(255,255,255,.92);
    color:#666f98;
    font-size:14px;
    font-weight:800;
    letter-spacing:.2px;
    box-shadow:
        0 10px 22px rgba(70,60,120,.12),
        inset 0 1px 0 rgba(255,255,255,.7);
    animation:milestonePop 1.05s ease forwards;
    backdrop-filter:blur(4px);
}
@keyframes milestonePop{
    0%{
        opacity:0;
        transform:translateY(10px) scale(.92);
    }
    18%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    82%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    100%{
        opacity:0;
        transform:translateY(-18px) scale(1.02);
    }
}

.title-banner{
    width:100%;
    aspect-ratio:3.5 / 1;
    background-image:url('./images/img_title.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    border:none;
    border-radius:16px;
    margin-bottom:8px;
    box-shadow:
        0 12px 22px rgba(84,96,156,.12),
        inset 0 1px 0 rgba(255,255,255,.24);
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
    appearance:none;
    -webkit-appearance:none;
}
.title-banner:hover{
    filter:brightness(1.02) saturate(1.03);
}
.title-banner:active{
    transform:scale(.992);
}
.title-banner:focus-visible{
    outline:none;
    box-shadow:
        0 0 0 3px rgba(255,255,255,.72),
        0 0 0 6px rgba(126,102,191,.24),
        0 12px 22px rgba(84,96,156,.12),
        inset 0 1px 0 rgba(255,255,255,.24);
}

.banner-desc{
    width:100%;
    margin-bottom:10px;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.70);
    backdrop-filter:blur(4px);
    box-shadow:
        0 6px 16px rgba(82,66,140,.04),
        inset 0 1px 0 rgba(255,255,255,.74);
    font-size:13px;
    line-height:1.5;
    color:#70779b;
    text-align:center;
}

.top-panel{
    width:100%;
    display:flex;
    align-items:stretch;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
}

.score-card{
    flex:1;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, var(--panel1) 0%, var(--panel2) 100%);
    border-radius:16px;
    padding:12px 14px;
    min-height:72px;
    box-shadow:
        0 10px 18px rgba(88,98,160,.14),
        inset 0 1px 0 rgba(255,255,255,.22);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.score-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:46%;
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0));
    pointer-events:none;
}
.score-label{
    font-size:12px;
    font-weight:bold;
    color:var(--panel-label);
    letter-spacing:.5px;
    margin-bottom:6px;
    position:relative;
    z-index:1;
}
.score-value{
    font-size:26px;
    line-height:1;
    font-weight:bold;
    color:var(--panel-value);
    position:relative;
    z-index:1;
    text-shadow:0 2px 5px rgba(74, 60, 112, .14);
}
.score-gain{
    position:absolute;
    top:10px;
    right:12px;
    font-size:16px;
    font-weight:700;
    color:rgba(255,255,255,.96);
    text-shadow:0 2px 6px rgba(74,60,112,.20);
    pointer-events:none;
    animation:scoreFloat .70s ease forwards;
    z-index:4;
}
@keyframes scoreFloat{
    0%{
        opacity:0;
        transform:translateY(6px) scale(.92);
    }
    18%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    100%{
        opacity:0;
        transform:translateY(-18px) scale(1.04);
    }
}
.best-burst{
    animation:bestPulse .7s ease;
}
.best-tag{
    position:absolute;
    top:10px;
    right:10px;
    padding:4px 8px;
    border-radius:999px;
    background:rgba(255,255,255,.92);
    color:#7078a7;
    font-size:10px;
    font-weight:800;
    letter-spacing:.4px;
    box-shadow:0 4px 10px rgba(74,60,112,.12);
    animation:bestTagPop .9s ease forwards;
    pointer-events:none;
    z-index:4;
}
@keyframes bestPulse{
    0%{ transform:scale(1); }
    35%{ transform:scale(1.06); }
    100%{ transform:scale(1); }
}
@keyframes bestTagPop{
    0%{
        opacity:0;
        transform:translateY(4px) scale(.92);
    }
    20%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    100%{
        opacity:0;
        transform:translateY(-10px) scale(1);
    }
}

#board{
    position:relative;
    width:100%;
    aspect-ratio:1 / 1;
    box-sizing:border-box;
    background:
        linear-gradient(180deg, #d3daf0 0%, var(--board) 56%, var(--board-dark) 100%);
    padding:0;
    border-radius:20px;
    box-shadow:
        0 16px 30px rgba(88,98,160,.14),
        inset 0 1px 0 rgba(255,255,255,.30),
        inset 0 -1px 0 rgba(74,60,112,.05);
    overflow:hidden;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}
#board::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:24%;
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0));
    pointer-events:none;
    z-index:0;
}
.grid{
    position:absolute;
    top:var(--pad-top);
    left:var(--pad-x);
    right:var(--pad-x);
    bottom:var(--pad-bottom);
    z-index:1;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:var(--gap);
}
.cell{
    background:rgba(239,242,250,.52);
    border-radius:var(--tile-radius);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.24);
}
#tiles,
#anim-layer{
    position:absolute;
    top:var(--pad-top);
    left:var(--pad-x);
    right:var(--pad-x);
    bottom:var(--pad-bottom);
    pointer-events:none;
    z-index:2;
    overflow:hidden;
    border-radius:12px;
}
.tile,
.anim-tile{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:var(--tile-radius);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}
.tile{
    z-index:5;
    overflow:visible;
}
.anim-tile{
    transition:
        top .21s cubic-bezier(.22,.61,.36,1),
        left .21s cubic-bezier(.22,.61,.36,1),
        opacity .21s ease,
        filter .21s ease;
    z-index:20;
    will-change:top, left, opacity, filter;
}
.tile-merged{
    animation:mergeResultPop .24s ease-out;
    will-change:transform, filter;
    z-index:8;
}
.tile-merge-ring{
    position:absolute;
    inset:-8px;
    border-radius:calc(var(--tile-radius) + 8px);
    border:3px solid rgba(255,255,255,.95);
    box-shadow:
        0 0 0 2px rgba(255,255,255,.18),
        0 0 14px rgba(255,255,255,.52),
        0 0 26px rgba(255,255,255,.24);
    opacity:0;
    pointer-events:none;
    animation:mergeRing .34s ease-out forwards;
}
.tile-merge-glow{
    position:absolute;
    inset:-10px;
    border-radius:calc(var(--tile-radius) + 10px);
    background:
        radial-gradient(circle, rgba(255,255,255,.38) 0%, rgba(255,255,255,.14) 36%, rgba(255,255,255,0) 72%);
    opacity:0;
    pointer-events:none;
    animation:mergeGlow .30s ease-out forwards;
    mix-blend-mode:screen;
}
.tile-num{
    position:absolute;
    right:6px;
    bottom:6px;
    min-width:22px;
    padding:2px 6px;
    border-radius:999px;
    background:rgba(255,255,255,.74);
    color:#5f6585;
    font-size:11px;
    line-height:1.1;
    font-weight:700;
    text-align:center;
    box-shadow:
        0 1px 3px rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.5);
    backdrop-filter:blur(2px);
    pointer-events:none;
}
@keyframes mergeResultPop{
    0%{
        transform:scale(.90);
        filter:brightness(1.18);
    }
    55%{
        transform:scale(1.08);
        filter:brightness(1.10);
    }
    100%{
        transform:scale(1);
        filter:brightness(1);
    }
}
@keyframes mergeRing{
    0%{
        opacity:.95;
        transform:scale(.74);
    }
    100%{
        opacity:0;
        transform:scale(1.10);
    }
}
@keyframes mergeGlow{
    0%{
        opacity:.9;
        transform:scale(.78);
    }
    100%{
        opacity:0;
        transform:scale(1.08);
    }
}

.overlay{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:rgba(65,72,116,.62);
    color:white;
    z-index:100;
    border-radius:20px;
    backdrop-filter:blur(2px);
    padding:18px;
}
.overlay-img{
    position:relative;
    width:180px;
    aspect-ratio:1 / 1;
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    background-color:rgba(255,255,255,.10);
    border-radius:12px;
    margin-bottom:18px;
    box-shadow:
        0 10px 22px rgba(44,34,73,.24),
        0 0 0 1px rgba(255,255,255,.10);
    overflow:visible;
    isolation:isolate;
}
.overlay-img::before{
    content:"";
    position:absolute;
    inset:-4px;
    border-radius:16px;
    border:2px solid rgba(255,220,140,.92);
    box-shadow:
        0 0 8px rgba(255,214,110,.42),
        0 0 18px rgba(255,196,70,.20),
        inset 0 0 8px rgba(255,245,210,.18);
    pointer-events:none;
    z-index:2;
}
 .overlay-img::after{
    content:none;
}

.gold-stars{
    position:absolute;
    inset:-16px;
    pointer-events:none;
    z-index:1;
}

.gold-star{
    position:absolute;
    left:var(--x);
    top:var(--y);
    width:calc(14px * var(--scale, 1));
    height:calc(14px * var(--scale, 1));
    transform:translate(-50%, -50%);
    opacity:.22;
    filter:
        drop-shadow(0 0 3px rgba(255,238,190,.18))
        drop-shadow(0 0 7px rgba(255,216,120,.10));
    animation:
        starBlink var(--blinkDur, 2.8s) ease-in-out infinite,
        starFloat var(--floatDur, 4.6s) ease-in-out infinite;
    animation-delay:
        var(--blinkDelay, 0s),
        var(--floatDelay, 0s);
    will-change:transform, opacity;
}
.gold-star::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at center,
            rgba(255,255,255,.95) 0%,
            rgba(255,244,210,.95) 18%,
            rgba(255,228,155,.72) 38%,
            rgba(255,220,130,0) 72%);
    clip-path:polygon(
        50% 0%,
        60% 38%,
        100% 50%,
        60% 62%,
        50% 100%,
        40% 62%,
        0% 50%,
        40% 38%
    );
}

.gold-star.sm{
    --scale:.5;
    opacity:.18;
    filter:
        drop-shadow(0 0 2px rgba(255,238,190,.14))
        drop-shadow(0 0 5px rgba(255,216,120,.08));
}

.gold-orbit{

    position:absolute;
    inset:-4px;
    border-radius:16px;
    pointer-events:none;
    z-index:3;
}
.gold-comet{
    position:absolute;
    width:18px;
    height:18px;
    transform:translate(-50%, -50%);
    pointer-events:none;
    opacity:.56;
    filter:
        blur(.2px)
        drop-shadow(0 0 4px rgba(255,245,210,.34))
        drop-shadow(0 0 10px rgba(255,220,130,.20))
        drop-shadow(0 0 18px rgba(255,196,70,.12));
    animation:rectOrbit 6.4s linear infinite;
}
.gold-comet::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:
        radial-gradient(circle,
            rgba(255,255,255,.92) 0%,
            rgba(255,244,210,.74) 26%,
            rgba(255,224,150,.38) 56%,
            rgba(255,210,110,.12) 76%,
            rgba(255,210,110,0) 100%);
}
.gold-comet::after{
    content:"";
    position:absolute;
    inset:-5px;
    border-radius:50%;
    background:
        radial-gradient(circle,
            rgba(255,235,170,.18) 0%,
            rgba(255,220,130,.10) 45%,
            rgba(255,210,110,0) 100%);
    filter:blur(3px);
}
.gold-comet:nth-child(1){
    animation-delay:0s;
}
.gold-comet:nth-child(2){
    animation-delay:-2.13s;
    opacity:.42;
}
.gold-comet:nth-child(3){
    animation-delay:-4.26s;
    opacity:.34;
}

@keyframes rectOrbit{
    0%{
        left:0%;
        top:0%;
    }
    12.5%{
        left:50%;
        top:0%;
    }
    25%{
        left:100%;
        top:0%;
    }
    37.5%{
        left:100%;
        top:50%;
    }
    50%{
        left:100%;
        top:100%;
    }
    62.5%{
        left:50%;
        top:100%;
    }
    75%{
        left:0%;
        top:100%;
    }
    87.5%{
        left:0%;
        top:50%;
    }
    100%{
        left:0%;
        top:0%;
    }
}

@keyframes starBlink{
    0%, 100%{ opacity:.10; }
    20%{ opacity:.18; }
    45%{ opacity:.42; }
    60%{ opacity:.20; }
    82%{ opacity:.34; }
}

@keyframes starFloat{
    0%, 100%{
        transform:translate(-50%, -50%) translate(0px, 0px) scale(1);
    }
    25%{
        transform:translate(-50%, -50%) translate(var(--mx1, 1px), var(--my1, -1px)) scale(1.04);
    }
    50%{
        transform:translate(-50%, -50%) translate(var(--mx2, -1px), var(--my2, 1px)) scale(.98);
    }
    75%{
        transform:translate(-50%, -50%) translate(var(--mx3, 1px), var(--my3, 1px)) scale(1.02);
    }
}

.overlay-title{
    margin-bottom:10px;
    font-size:22px;
    font-weight:bold;
    letter-spacing:.6px;
}
.overlay-msg{
    margin:0 0 14px;
    font-size:14px;
    line-height:1.45;
    color:rgba(255,255,255,.88);
    text-align:center;
    padding:0 20px;
}
.overlay-sub{
    margin:-2px 0 14px;
    font-size:14px;
    color:rgba(255,255,255,.92);
    letter-spacing:.2px;
}

.overlay-badge{
    min-height:28px;
    margin-bottom:14px;
    padding:7px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.18);
    color:#fff;
    font-size:12px;
    font-weight:800;
    letter-spacing:.35px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        0 6px 12px rgba(38,28,70,.10);
}
.overlay-badge.is-hidden{
    visibility:hidden;
}
.tile-result-badge{
    margin-top:-2px;
    margin-bottom:14px;
    padding:8px 14px;
    min-height:32px;
    background:rgba(255,255,255,.18);
    color:#fff;
    font-size:13px;
    font-weight:800;
    letter-spacing:.35px;
    border-radius:999px;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        0 6px 12px rgba(38,28,70,.10);
}

.gameover-tight{
    margin-bottom:0;
}
.gameover-replay{
    margin-top:0;
}
.gameover-extra-note{
    display:none !important;
}
.win-result-badge{
    margin-top:2px;
    margin-bottom:16px;
    padding:10px 18px;
    min-height:38px;
    background:rgba(204,191,244,.42);
    border:1px solid rgba(255,255,255,.20);
    color:#fff;
    font-size:14px;
    font-weight:800;
    letter-spacing:.35px;
    border-radius:999px;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 8px 18px rgba(38,28,70,.14);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    backdrop-filter:blur(4px);
}

.overlay-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}
.overlay button{
    padding:12px 20px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#f7f8ff;
    color:#676f95;
    box-shadow:0 6px 14px rgba(74,60,112,.14);
    min-width:120px;
}
.overlay button:active{
    transform:scale(.98);
}

@media (max-width:420px){
    body{
        padding:14px 0 20px;
    }
    .title-banner{ border-radius:14px; }
    .banner-desc{
        font-size:12px;
        padding:9px 12px;
    }
    .score-card{
        min-height:68px;
        border-radius:14px;
    }
    .score-value{ font-size:22px; }
    #board{ border-radius:18px; }
    .overlay{ border-radius:18px; }
    .tile-num{
        right:5px;
        bottom:5px;
        min-width:20px;
        padding:2px 5px;
        font-size:10px;
    }
    .overlay-msg,
    .overlay-sub{
        font-size:13px;
    }
    .milestone{
        font-size:13px;
        padding:9px 14px;
    }
    .overlay button{
        min-width:110px;
        font-size:15px;
    }
    .win-result-badge{
        font-size:13px;
        padding:9px 14px;
    }
}
</style>
</head>
<body>

<div id="app">
    <div class="version-note">
        v2.7.0 수정 : 엔딩 별 파티클 점멸 분산 + 작은 파티클 8개 + 버튼/간격 정리
    </div>

    <div id="loading-note" class="loading-note">이미지 로딩 중...</div>
    <div id="debug-indicator" class="debug-indicator">DEBUG MODE ON · Shift+W 승리 / Shift+G 게임오버</div>
    <div id="milestone-wrap" class="milestone-wrap"></div>

    <button
        class="title-banner"
        id="title-banner"

<script>
const SIZE = 4;
const GAP = 10;
const MOVE_MS = 210;

const PRELOAD_IMAGES = [
    "./images/img_title.jpg",
    "./images/img_2.jpg",
    "./images/img_4.jpg",
    "./images/img_8.jpg",
    "./images/img_16.jpg",
    "./images/img_32.jpg",
    "./images/img_64.jpg",
    "./images/img_128.jpg",
    "./images/img_256.jpg",
    "./images/img_512.jpg",
    "./images/img_1024.jpg",
    "./images/img_2048.jpg"
];

const MILESTONE_VALUES = [128, 256, 512, 1024, 2048];

let board = [];
let score = 0;
let best = Number(localStorage.getItem("bestScore") || 0);
let wonShown = false;
let moving = false;
let debugMode = false;

let cellWidth = 0;
let cellHeight = 0;

let lastSpawn = null;
let mergeCells = [];

let startX = 0;
let startY = 0;
let trackingTouch = false;

let achievedMilestones = new Set();
let bestJustUpdated = false;

const loadingNoteEl = document.getElementById("loading-note");
const debugIndicatorEl = document.getElementById("debug-indicator");
const milestoneWrapEl = document.getElementById("milestone-wrap");
const boardEl = document.getElementById("board");
const tilesEl = document.getElementById("tiles");
const animLayer = document.getElementById("anim-layer");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const bg = document.getElementById("bg");
const winOverlay = document.getElementById("winoverlay");
const gameOverOverlay = document.getElementById("gameover");
const winImg = document.getElementById("win-img");
const gameOverImg = document.getElementById("gameover-img");
const winTileLabel = document.getElementById("win-tile-label");
const winResultBadge = document.getElementById("win-result-badge");
const gameOverTileBadge = document.getElementById("gameover-tile-badge");
const gameOverMsg = document.getElementById("gameover-msg");
const gameOverBadge = document.getElementById("gameover-badge");
const scoreCardEl = document.getElementById("score-card");
const bestCardEl = document.getElementById("best-card");
const titleBannerEl = document.getElementById("title-banner");

bestEl.innerText = String(best);

function updateDebugIndicator(){
    debugIndicatorEl.classList.toggle("show", debugMode);
}

function toggleDebugMode(){
    debugMode = !debugMode;
    updateDebugIndicator();
    showMilestone(debugMode ? "디버그 모드 ON" : "디버그 모드 OFF");
}

function forceWinOverlay(){
    hideOverlays();
    wonShown = true;
    showWin();
}

function forceGameOverOverlay(){
    hideOverlays();
    showGameOver();
}

function preloadImages(srcList){
    loadingNoteEl.classList.add("show");

    const tasks = srcList.map(src => {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({ src, ok: true });
            img.onerror = () => resolve({ src, ok: false });
            img.src = src;
        });
    });

    return Promise.all(tasks).finally(() => {
        loadingNoteEl.classList.remove("show");
    });
}

function emptyBoard(){
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
}

function calculateLayout(){
    const width = tilesEl.clientWidth;
    const height = tilesEl.clientHeight;

    cellWidth = (width - GAP * (SIZE - 1)) / SIZE;
    cellHeight = (height - GAP * (SIZE - 1)) / SIZE;

    renderBoard();
}

function pos(r, c){
    return {
        top: (cellHeight + GAP) * r,
        left: (cellWidth + GAP) * c
    };
}

function hideOverlays(){
    winOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";
}

function setBadge(el, text){
    if(text){
        el.textContent = text;
        el.classList.remove("is-hidden");
    }else{
        el.textContent = "";
        el.classList.add("is-hidden");
    }
}

function getGameOverMessageByMax(max){
    if(max >= 1024) return "거의 다 왔어요. 다음 번엔 2048까지!";
    if(max >= 512) return "좋아요! 다음 판엔 더 크게 갈 수 있어요.";
    if(max >= 256) return "흐름이 좋아요. 다음 판이 더 기대돼요.";
    return "조금만 더 익숙해지면 금방 올라가요.";
}

function getGameOverBadgeText(max){
    if(bestJustUpdated) return "NEW BEST!";
    if(max >= 1024) return "첫 1024 달성!";
    if(max >= 512) return "512 달성!";
    return "";
}

function showWin(){
    winImg.style.backgroundImage = "url('./images/img_2048.jpg')";
    winResultBadge.textContent = "2048 타일을 완성했어요 ✨";
    winTileLabel.textContent = "";
    winOverlay.style.display = "flex";
}

function showGameOver(){
    const max = getMaxTile() || 2;
    const safeImgValue = PRELOAD_IMAGES.includes(`./images/img_${max}.jpg`) ? max : 2;

    gameOverImg.style.backgroundImage = `url('./images/img_${safeImgValue}.jpg')`;
    gameOverMsg.textContent = getGameOverMessageByMax(max);
    setBadge(gameOverTileBadge, `${max} 타일을 완성했어요!`);
    setBadge(gameOverBadge, getGameOverBadgeText(max));
    gameOverOverlay.style.display = "flex";
}

function getMaxTile(){
    let max = 0;
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] > max) max = board[r][c];
        }
    }
    return max;
}

function celebrateBest(){
    bestCardEl.classList.remove("best-burst");
    void bestCardEl.offsetWidth;
    bestCardEl.classList.add("best-burst");

    const oldTag = bestCardEl.querySelector(".best-tag");
    if(oldTag) oldTag.remove();

    const tag = document.createElement("div");
    tag.className = "best-tag";
    tag.textContent = "NEW BEST!";
    bestCardEl.appendChild(tag);

    setTimeout(() => {
        bestCardEl.classList.remove("best-burst");
        tag.remove();
    }, 900);
}

function showScoreGain(amount){
    if(!amount) return;

    const el = document.createElement("div");
    el.className = "score-gain";
    el.textContent = `+${amount}`;
    scoreCardEl.appendChild(el);

    setTimeout(() => {
        el.remove();
    }, 700);
}

function getMilestoneMessage(value){
    switch(value){
        case 128: return "✨ 128 달성!";
        case 256: return "🌟 256 도달!";
        case 512: return "🔥 512 달성!";
        case 1024: return "💫 1024까지 왔어요!";
        case 2048: return "🎉 2048 완성!";
        default: return String(value);
    }
}

function showMilestone(value){
    const oldBanner = milestoneWrapEl.querySelector(".milestone");
    if(oldBanner) oldBanner.remove();

    const el = document.createElement("div");
    el.className = "milestone";
    el.textContent = getMilestoneMessage(value);
    milestoneWrapEl.appendChild(el);

    setTimeout(() => {
        el.remove();
    }, 1100);
}

function checkMilestonesFromBoard(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            const value = board[r][c];
            if(MILESTONE_VALUES.includes(value) && !achievedMilestones.has(value)){
                achievedMilestones.add(value);
                showMilestone(value);
                return;
            }
        }
    }
}

function updateScore(){
    scoreEl.innerText = String(score);

    bestJustUpdated = false;
    const prevBest = best;

    if(score > best){
        best = score;
        bestJustUpdated = true;
        localStorage.setItem("bestScore", String(best));

        if(best > prevBest){
            celebrateBest();
        }
    }

    bestEl.innerText = String(best);
}

function appendTileNumberBadge(el, value){
    const badge = document.createElement("div");
    badge.className = "tile-num";
    badge.textContent = value;
    el.appendChild(badge);
}

function isMergeCell(r, c){
    return mergeCells.some(cell => cell.r === r && cell.c === c);
}

function renderBoard(){
    if(!cellWidth || !cellHeight) return;

    tilesEl.innerHTML = "";

    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            const value = board[r][c];
            if(!value) continue;

            const tile = document.createElement("div");
            tile.className = "tile";
            tile.style.width = cellWidth + "px";
            tile.style.height = cellHeight + "px";

            const p = pos(r, c);
            tile.style.top = p.top + "px";
            tile.style.left = p.left + "px";
            tile.style.backgroundImage = `url('./images/img_${value}.jpg')`;

            if(isMergeCell(r, c)){
                tile.classList.add("tile-merged");

                const glow = document.createElement("div");
                glow.className = "tile-merge-glow";
                tile.appendChild(glow);

                const ring = document.createElement("div");
                ring.className = "tile-merge-ring";
                tile.appendChild(ring);
            }

            appendTileNumberBadge(tile, value);
            tilesEl.appendChild(tile);
        }
    }
}

function getEmptyCells(){
    const empty = [];
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) empty.push({ r, c });
        }
    }
    return empty;
}

function spawn(forceValue = null){
    const empty = getEmptyCells();
    if(empty.length === 0){
        lastSpawn = null;
        return;
    }

    const pick = empty[Math.floor(Math.random() * empty.length)];
    board[pick.r][pick.c] = forceValue ?? (Math.random() < 0.9 ? 2 : 4);
    lastSpawn = { r: pick.r, c: pick.c };
}

function has2048Tile(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] >= 2048) return true;
        }
    }
    return false;
}

function isGameOver(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) return false;
            if(c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
            if(r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
        }
    }
    return true;
}

function cloneBoard(src){
    return src.map(row => [...row]);
}

function linesEqual(a, b){
    for(let i = 0; i < a.length; i++){
        if(a[i] !== b[i]) return false;
    }
    return true;
}

function slideAndMergeLineDetailed(line){
    const items = [];
    for(let i = 0; i < line.length; i++){
        if(line[i] !== 0){
            items.push({ value: line[i], from: i });
        }
    }

    const result = Array(SIZE).fill(0);
    const moves = [];
    const merges = [];
    let gained = 0;
    let write = 0;

    for(let i = 0; i < items.length; i++){
        const cur = items[i];
        const next = items[i + 1];

        if(next && cur.value === next.value){
            const mergedValue = cur.value * 2;
            result[write] = mergedValue;
            gained += mergedValue;

            moves.push({
                from: cur.from,
                to: write,
                value: cur.value,
                merged: true,
                fadeLate: false
            });
            moves.push({
                from: next.from,
                to: write,
                value: next.value,
                merged: true,
                fadeLate: true
            });

            merges.push({
                index: write,
                value: mergedValue
            });

            i++;
            write++;
        }else{
            result[write] = cur.value;
            moves.push({
                from: cur.from,
                to: write,
                value: cur.value,
                merged: false,
                fadeLate: false
            });
            write++;
        }
    }

    return {
        line: result,
        gained,
        moves,
        merges
    };
}

function buildMoveResult(dir){
    const oldBoard = cloneBoard(board);
    const newBoard = emptyBoard();
    const animations = [];
    const mergedCellsOut = [];
    let moved = false;
    let gainedTotal = 0;

    if(dir === "ArrowLeft" || dir === "ArrowRight"){
        for(let r = 0; r < SIZE; r++){
            const original = [...oldBoard[r]];
            const working = dir === "ArrowLeft" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalLine = dir === "ArrowLeft" ? res.line : [...res.line].reverse();

            newBoard[r] = finalLine;
            gainedTotal += res.gained;

            if(!linesEqual(original, finalLine)) moved = true;

            res.moves.forEach(m => {
                const fromC = dir === "ArrowLeft" ? m.from : (SIZE - 1 - m.from);
                const toC = dir === "ArrowLeft" ? m.to : (SIZE - 1 - m.to);

                animations.push({
                    fromR: r,
                    fromC,
                    toR: r,
                    toC,
                    value: m.value,
                    merged: m.merged,
                    fadeLate: m.fadeLate
                });
            });

            res.merges.forEach(m => {
                const c = dir === "ArrowLeft" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }else{
        for(let c = 0; c < SIZE; c++){
            const original = [];
            for(let r = 0; r < SIZE; r++) original.push(oldBoard[r][c]);

            const working = dir === "ArrowUp" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalCol = dir === "ArrowUp" ? res.line : [...res.line].reverse();

            for(let r = 0; r < SIZE; r++) newBoard[r][c] = finalCol[r];
            gainedTotal += res.gained;

            if(!linesEqual(original, finalCol)) moved = true;

            res.moves.forEach(m => {
                const fromR = dir === "ArrowUp" ? m.from : (SIZE - 1 - m.from);
                const toR = dir === "ArrowUp" ? m.to : (SIZE - 1 - m.to);

                animations.push({
                    fromR,
                    fromC: c,
                    toR,
                    toC: c,
                    value: m.value,
                    merged: m.merged,
                    fadeLate: m.fadeLate
                });
            });

            res.merges.forEach(m => {
                const r = dir === "ArrowUp" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }

    return {
        newBoard,
        animations,
        mergeCells: mergedCellsOut,
        gained: gainedTotal,
        moved
    };
}

function createAnimTile(value, r, c){
    const el = document.createElement("div");
    el.className = "anim-tile";
    el.style.width = cellWidth + "px";
    el.style.height = cellHeight + "px";

    const p = pos(r, c);
    el.style.top = p.top + "px";
    el.style.left = p.left + "px";
    el.style.backgroundImage = `url('./images/img_${value}.jpg')`;

    appendTileNumberBadge(el, value);
    animLayer.appendChild(el);
    return el;
}

function playMoveAnimation(animations, onDone){
    animLayer.innerHTML = "";

    if(animations.length === 0){
        onDone();
        return;
    }

    const animTiles = animations.map(a => {
        const el = createAnimTile(a.value, a.fromR, a.fromC);
        return { el, ...a };
    });

    tilesEl.style.visibility = "hidden";

    requestAnimationFrame(() => {
        animTiles.forEach(a => {
            const p = pos(a.toR, a.toC);
            a.el.style.top = p.top + "px";
            a.el.style.left = p.left + "px";

            if(a.merged){
                a.el.style.filter = "brightness(1.04)";
            }
        });
    });

    setTimeout(() => {
        animTiles.forEach(a => {
            if(a.merged){
                a.el.style.opacity = a.fadeLate ? "0" : "0.18";
                a.el.style.filter = "brightness(1.10)";
            }
        });
    }, MOVE_MS - 24);

    setTimeout(() => {
        animLayer.innerHTML = "";
        onDone();
    }, MOVE_MS + 20);
}

function move(dir){
    if(moving) return;
    if(winOverlay.style.display === "flex") return;
    if(gameOverOverlay.style.display === "flex") return;

    moving = true;
    lastSpawn = null;
    mergeCells = [];

    const res = buildMoveResult(dir);

    if(!res.moved){
        moving = false;
        return;
    }

    score += res.gained;
    updateScore();
    showScoreGain(res.gained);

    playMoveAnimation(res.animations, () => {
        board = res.newBoard;
        mergeCells = res.mergeCells;

        spawn();
        renderBoard();
        tilesEl.style.visibility = "visible";

        checkMilestonesFromBoard();

        setTimeout(() => {
            mergeCells = [];
            renderBoard();
        }, 260);

        if(!wonShown && has2048Tile()){
            wonShown = true;
            showWin();
        }else if(isGameOver()){
            showGameOver();
        }

        moving = false;
    });
}

async function copyText(text){
    try{
        await navigator.clipboard.writeText(text);
        showMilestone("복사 완료!");
    }catch(e){
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        showMilestone("복사 완료!");
    }
}

function buildResultText(mode){
    return "https://anykey0923.github.io/KEY2048/v1/";
}

function copyResult(mode){
    copyText(buildResultText(mode));
}

function restart(){
    hideOverlays();
    animLayer.innerHTML = "";
    tilesEl.style.visibility = "visible";
    milestoneWrapEl.innerHTML = "";

    setBadge(gameOverTileBadge, "");
    setBadge(gameOverBadge, "");

    board = emptyBoard();
    score = 0;
    wonShown = false;
    moving = false;
    lastSpawn = null;
    mergeCells = [];
    trackingTouch = false;
    achievedMilestones = new Set();
    bestJustUpdated = false;

    scoreEl.innerText = "0";
    bestEl.innerText = String(best);

    spawn(2);
    spawn(2);
    renderBoard();
}

window.addEventListener("keydown", e => {
    if(e.shiftKey && (e.key === "D" || e.key === "d")){
        e.preventDefault();
        toggleDebugMode();
        return;
    }

    if(e.shiftKey && (e.key === "W" || e.key === "w")){
        e.preventDefault();
        if(debugMode){
            forceWinOverlay();
        }
        return;
    }

    if(e.shiftKey && (e.key === "G" || e.key === "g")){
        e.preventDefault();
        if(debugMode){
            forceGameOverOverlay();
        }
        return;
    }

    if(e.key === "Escape"){
        hideOverlays();
        return;
    }

    if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
        e.preventDefault();
        move(e.key);
    }
});

boardEl.addEventListener("touchstart", e => {
    if(e.touches.length !== 1){
        trackingTouch = false;
        e.preventDefault();
        return;
    }

    trackingTouch = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, { passive:false });

boardEl.addEventListener("touchmove", e => {
    e.preventDefault();

    if(e.touches.length > 1){
        trackingTouch = false;
        return;
    }
}, { passive:false });

boardEl.addEventListener("touchend", e => {
    if(!trackingTouch) return;
    if(e.changedTouches.length !== 1) return;

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    trackingTouch = false;

    if(Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;

    if(Math.abs(dx) > Math.abs(dy)){
        move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    }else{
        move(dy > 0 ? "ArrowDown" : "ArrowUp");
    }
}, { passive:true });

boardEl.addEventListener("touchcancel", () => {
    trackingTouch = false;
}, { passive:true });

titleBannerEl.addEventListener("click", () => {
    restart();
});

document.addEventListener("gesturestart", e => {
    e.preventDefault();
}, { passive:false });

document.addEventListener("gesturechange", e => {
    e.preventDefault();
}, { passive:false });

document.addEventListener("gestureend", e => {
    e.preventDefault();
}, { passive:false });

function init(){
    if(bg.children.length === 0){
        for(let i = 0; i < 16; i++){
            const d = document.createElement("div");
            d.className = "cell";
            bg.appendChild(d);
        }
    }

    board = emptyBoard();
    updateScore();
    achievedMilestones = new Set();
    bestJustUpdated = false;
    updateDebugIndicator();

    spawn(2);
    spawn(2);

    requestAnimationFrame(() => {
        calculateLayout();
    });

    window.addEventListener("resize", calculateLayout);
}

preloadImages(PRELOAD_IMAGES).then(() => {
    init();
});
