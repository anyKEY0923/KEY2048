<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
body{
    margin:0;
    background:#faf8ef;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    touch-action:none;
}
h2{
    margin-bottom:10px;
}
#board{
    position:relative;
    width:min(92vw,420px);
    height:min(92vw,420px);
    background:#bbada0;
    padding:10px;
    border-radius:6px;
    box-sizing:border-box;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:10px;
    height:100%;
}
.cell{
    background:rgba(238,228,218,.35);
    border-radius:3px;
}
.tile{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    background-size:cover;
    background-position:center;
    transition:top .15s, left .15s, transform .12s ease, opacity .12s ease;
    z-index:1;
}
.tile-merge{
    animation:merge .24s ease-out;
    z-index:2;
}
.tile-removing{
    z-index:0;
    opacity:0;
}
@keyframes merge{
    0%{transform:scale(1)}
    45%{transform:scale(1.24)}
    100%{transform:scale(1)}
}
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.65);
    color:white;
    z-index:10;
}
.overlay-img{
    width:180px;
    height:180px;
    background-size:cover;
    background-position:center;
    border-radius:8px;
    margin-bottom:20px;
}
.overlay-title{
    margin-bottom:15px;
    font-size:22px;
    font-weight:bold;
}
.overlay-buttons{
    display:flex;
    gap:10px;
}
.overlay button{
    padding:12px 26px;
    font-size:18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<div style="font-size:12px; color:#888; margin-bottom:6px;">
v1.7.0 수정 : 라인 기반 이동 로직으로 전면 교체, SHIFT+W WIN 테스트 추가
</div>

<h2>
Score <span id="score">0</span>
&nbsp;&nbsp;
Best <span id="best">0</span>
</h2>

<div id="board">
    <div class="grid" id="bg"></div>
    <div id="tiles"></div>

    <div id="winoverlay" class="overlay">
        <div id="win-img" class="overlay-img"></div>
        <div class="overlay-title">YOU WIN</div>
        <div class="overlay-buttons">
            <button onclick="restart()">REPLAY</button>
        </div>
    </div>

    <div id="gameover" class="overlay">
        <div id="gameover-img" class="overlay-img"></div>
        <div class="overlay-title">GAME OVER</div>
        <div class="overlay-buttons">
            <button onclick="restart()">REPLAY</button>
        </div>
    </div>
</div>

<script>
const SIZE = 4;
const gap = 10;

let tiles = [];
let board = [];
let score = 0;
let best = Number(localStorage.getItem("bestScore") || 0);
let idCounter = 0;
let moving = false;
let wonShown = false;
let cellSize = 0;

const tileLayer = document.getElementById("tiles");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const boardEl = document.getElementById("board");
const bg = document.getElementById("bg");
const winOverlay = document.getElementById("winoverlay");
const gameOverOverlay = document.getElementById("gameover");
const winImg = document.getElementById("win-img");
const gameOverImg = document.getElementById("gameover-img");

bestEl.innerText = best;

function calculateLayout(){
    const size = boardEl.clientWidth;
    cellSize = (size - gap * 5) / 4;

    tiles.forEach(tile => {
        tile.el.style.width = cellSize + "px";
        tile.el.style.height = cellSize + "px";
        updateTile(tile);
    });
}

function pos(r, c){
    return {
        top: gap + (cellSize + gap) * r,
        left: gap + (cellSize + gap) * c
    };
}

function createTile(value, r, c){
    const el = document.createElement("div");
    el.className = "tile";
    el.style.width = cellSize + "px";
    el.style.height = cellSize + "px";
    el.style.backgroundImage = `url('./images/img_${value}.jpg')`;
    tileLayer.appendChild(el);

    const tile = {
        id: idCounter++,
        value,
        r,
        c,
        el,
        merged: false,
        isRemoving: false
    };

    tiles.push(tile);
    updateTile(tile);

    el.style.transform = "scale(0)";
    requestAnimationFrame(() => {
        el.style.transform = "scale(1)";
    });

    return tile;
}

function updateTile(tile){
    const p = pos(tile.r, tile.c);
    tile.el.style.top = p.top + "px";
    tile.el.style.left = p.left + "px";
    tile.el.style.backgroundImage = `url('./images/img_${tile.value}.jpg')`;

    tile.el.classList.toggle("tile-merge", !!tile.merged);
    tile.el.classList.toggle("tile-removing", !!tile.isRemoving);
}

function rebuildBoard(){
    board = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    tiles.forEach(tile => {
        if(!tile.isRemoving){
            board[tile.r][tile.c] = tile;
        }
    });
}

function spawn(){
    rebuildBoard();

    const empty = [];
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(!board[r][c]) empty.push({ r, c });
        }
    }

    if(!empty.length) return;

    const { r, c } = empty[Math.floor(Math.random() * empty.length)];
    createTile(Math.random() < 0.9 ? 2 : 4, r, c);
}

function has2048Tile(){
    return tiles.some(tile => !tile.isRemoving && tile.value >= 2048);
}

function getMaxTile(){
    let max = 0;
    tiles.forEach(tile => {
        if(!tile.isRemoving && tile.value > max) max = tile.value;
    });
    return max;
}

function hideOverlays(){
    winOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";
}

function showWin(){
    winImg.style.backgroundImage = `url('./images/img_2048.jpg')`;
    winOverlay.style.display = "flex";
}

function showGameOver(){
    const max = getMaxTile() || 2;
    gameOverImg.style.backgroundImage = `url('./images/img_${max}.jpg')`;
    gameOverOverlay.style.display = "flex";
}

function updateScore(){
    scoreEl.innerText = score;
    if(score > best){
        best = score;
        localStorage.setItem("bestScore", String(best));
        bestEl.innerText = best;
    }
}

function clearTileFlags(){
    tiles.forEach(tile => {
        tile.merged = false;
        tile.isRemoving = false;
        tile.el.classList.remove("tile-merge", "tile-removing");
    });
}

function cleanupAfterMove(){
    tiles.filter(tile => tile.isRemoving).forEach(tile => tile.el.remove());
    tiles = tiles.filter(tile => !tile.isRemoving);

    tiles.forEach(tile => {
        tile.merged = false;
        tile.isRemoving = false;
        updateTile(tile);
    });
}

function getLine(index, dir){
    const line = [];
    if(dir === "ArrowLeft" || dir === "ArrowRight"){
        for(let c = 0; c < SIZE; c++){
            line.push(board[index][c]);
        }
        if(dir === "ArrowRight") line.reverse();
    }else{
        for(let r = 0; r < SIZE; r++){
            line.push(board[r][index]);
        }
        if(dir === "ArrowDown") line.reverse();
    }
    return line;
}

function setLine(index, dir, line){
    const arr = [...line];
    if(dir === "ArrowRight" || dir === "ArrowDown") arr.reverse();

    if(dir === "ArrowLeft" || dir === "ArrowRight"){
        for(let c = 0; c < SIZE; c++){
            board[index][c] = arr[c];
            if(arr[c]){
                arr[c].r = index;
                arr[c].c = c;
            }
        }
    }else{
        for(let r = 0; r < SIZE; r++){
            board[r][index] = arr[r];
            if(arr[r]){
                arr[r].r = r;
                arr[r].c = index;
            }
        }
    }
}

function processLine(line){
    const originalIds = line.map(tile => tile ? tile.id : null);

    const compact = line.filter(tile => tile !== null);
    const result = [];
    let changed = false;

    for(let i = 0; i < compact.length; i++){
        const current = compact[i];
        const next = compact[i + 1];

        if(next && current.value === next.value){
            next.isRemoving = true;
            current.value *= 2;
            current.merged = true;
            score += current.value;

            result.push(current);
            i++;
            changed = true;
        }else{
            result.push(current);
        }
    }

    while(result.length < SIZE){
        result.push(null);
    }

    const resultIds = result.map(tile => tile ? tile.id : null);

    if(!changed){
        for(let i = 0; i < SIZE; i++){
            if(originalIds[i] !== resultIds[i]){
                changed = true;
                break;
            }
        }
    }

    return { line: result, changed };
}

function move(dir){
    if(moving) return;
    if(gameOverOverlay.style.display === "flex") return;
    if(winOverlay.style.display === "flex") return;

    moving = true;
    hideOverlays();
    rebuildBoard();
    clearTileFlags();

    let moved = false;

    for(let i = 0; i < SIZE; i++){
        const line = getLine(i, dir);
        const processed = processLine(line);
        setLine(i, dir, processed.line);
        if(processed.changed) moved = true;
    }

    if(!moved){
        moving = false;
        return;
    }

    tiles.forEach(tile => {
        if(tile) updateTile(tile);
    });
    updateScore();

    setTimeout(() => {
        cleanupAfterMove();
        rebuildBoard();
        spawn();

        if(!wonShown && has2048Tile()){
            wonShown = true;
            showWin();
        }else if(isGameOver()){
            showGameOver();
        }

        moving = false;
    }, 150);
}

function isGameOver(){
    rebuildBoard();

    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(!board[r][c]) return false;

            if(c < SIZE - 1 && board[r][c].value === board[r][c + 1].value) return false;
            if(r < SIZE - 1 && board[r][c].value === board[r + 1][c].value) return false;
        }
    }

    return true;
}

function restart(){
    hideOverlays();

    tiles.forEach(tile => tile.el.remove());
    tiles = [];
    board = [];
    score = 0;
    idCounter = 0;
    moving = false;
    wonShown = false;

    scoreEl.innerText = "0";
    bestEl.innerText = String(best);

    spawn();
    spawn();
}

window.addEventListener("keydown", e => {
    if(e.shiftKey && (e.key === "W" || e.key === "w")){
        e.preventDefault();
        if(winOverlay.style.display === "flex"){
            hideOverlays();
        }else if(gameOverOverlay.style.display !== "flex"){
            showWin();
        }
        return;
    }

    if(e.key === "Escape"){
        hideOverlays();
        return;
    }

    if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
        e.preventDefault();
        move(e.key);
    }
});

let startX = 0;
let startY = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, { passive:true });

document.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    if(Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;

    if(Math.abs(dx) > Math.abs(dy)){
        move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    }else{
        move(dy > 0 ? "ArrowDown" : "ArrowUp");
    }
}, { passive:true });

function init(){
    calculateLayout();
    window.addEventListener("resize", calculateLayout);

    if(bg.children.length === 0){
        for(let i = 0; i < 16; i++){
            const d = document.createElement("div");
            d.className = "cell";
            bg.appendChild(d);
        }
    }

    spawn();
    spawn();
}

init();
</script>
</body>
</html>
