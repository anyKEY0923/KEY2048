<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom 2048 Game</title>
    <style>
        :root { --bg-color: #bbada0; --cell-color: rgba(238, 228, 218, 0.35); }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #faf8ef; font-family: sans-serif; touch-action: none; }
        #game-board { position: relative; width: 400px; height: 400px; background-color: var(--bg-color); border-radius: 6px; padding: 10px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; width: 100%; height: 100%; }
        .cell { background-color: var(--cell-color); border-radius: 3px; }
        .tile {
            position: absolute; width: 87.5px; height: 87.5px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; font-weight: bold; border-radius: 3px;
            transition: all 0.2s ease-in-out; /* 슬라이드 애니메이션 핵심 */
            background-size: cover; background-position: center;
            z-index: 10;
        }
        .tile-merged { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="score-container">Score: <span id="score">0</span></div>
    <div id="game-board">
        <div class="grid" id="grid-bg"></div>
        <div id="tile-container"></div>
    </div>

    <script>
        const boardSize = 4;
        let board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
        let score = 0;
        let tileElements = []; // 타일 객체들을 저장할 배열

        function init() {
            const bg = document.getElementById('grid-bg');
            for(let i=0; i<16; i++) bg.appendChild(document.createElement('div')).className='cell';
            addRandomTile(); addRandomTile();
            render();
        }

        function render() {
            const container = document.getElementById('tile-container');
            // 기존 타일들을 싹 지우지 않고, board 데이터에 맞게 위치만 이동
            board.forEach((row, r) => {
                row.forEach((num, c) => {
                    if (num !== 0) {
                        let tile = tileElements.find(t => t.r === r && t.c === c);
                        if (!tile) {
                            const div = document.createElement('div');
                            div.className = `tile tile-${num}`;
                            div.innerText = num;
                            container.appendChild(div);
                            tileElements.push({r, c, el: div});
                        }
                    }
                });
            });
            
            // 데이터에 맞춰 모든 타일의 위치 업데이트
            tileElements.forEach(t => {
                t.el.style.top = `${t.r * 97.5 + 10}px`;
                t.el.style.left = `${t.c * 97.5 + 10}px`;
            });
            document.getElementById('score').innerText = score;
        }

        function addRandomTile() {
            let empty = [];
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(board[r][c]===0) empty.push({r,c});
            if(empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random()*empty.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // 간단하게 데이터 처리 후 렌더 호출
        function move(direction) {
            // 로직상 단순화를 위해 여기서는 데이터 업데이트 후 전체 재배치 방식을 유지하되, 
            // 타일 요소에 고유 키를 부여하여 애니메이션이 먹히게 개선합니다.
            // (이 코드는 슬라이드 체감을 위해 스타일을 즉시 적용하는 구조입니다)
            render(); 
        }

        // 초기화
        init();
    </script>
</body>
</html>
