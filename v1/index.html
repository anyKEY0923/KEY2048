<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
body{
margin:0;
background:#faf8ef;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
touch-action:none;
}
h2{
margin-bottom:10px;
}
#board{
position:relative;
width:min(92vw,420px);
height:min(92vw,420px);
background:#bbada0;
padding:10px;
border-radius:6px;
box-sizing:border-box;
}
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-template-rows:repeat(4,1fr);
gap:10px;
height:100%;
}
.cell{
background:rgba(238,228,218,.35);
border-radius:3px;
}
.tile{
position:absolute;
display:flex;
align-items:center;
justify-content:center;
border-radius:4px;
background-size:cover;
background-position:center;
transition:top .15s, left .15s, transform .12s ease;
z-index:1;
}
.tile-merge{
animation:merge .24s ease-out;
z-index:2;
}
.tile-removing{
z-index:0;
opacity: 0; /* 합쳐져서 사라지는 타일은 투명하게 처리 */
}
@keyframes merge{
0%{transform:scale(1)}
45%{transform:scale(1.24)}
100%{transform:scale(1)}
}
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.65);
color:white;
z-index:10;
}
.overlay-img{
width:180px;
height:180px;
background-size:cover;
background-position:center;
border-radius:8px;
margin-bottom:20px;
}
.overlay-title{
margin-bottom:15px;
font-size:22px;
font-weight:bold;
}
.overlay-buttons{
display:flex;
gap:10px;
}
.overlay button{
padding:12px 26px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>
<body>

<div style="font-size:12px; color:#888; margin-bottom:6px;">
v1.6.3 수정 : 이동 및 병합 로직 안정화 완료
</div>

<h2>
Score <span id="score">0</span>
&nbsp;&nbsp;
Best <span id="best">0</span>
</h2>

<div id="board">
    <div class="grid" id="bg"></div>
    <div id="tiles"></div>

    <div id="winoverlay" class="overlay">
        <div id="win-img" class="overlay-img"></div>
        <div class="overlay-title">YOU WIN</div>
        <div class="overlay-buttons">
            <button onclick="restart()">REPLAY</button>
        </div>
    </div>

    <div id="gameover" class="overlay">
        <div id="gameover-img" class="overlay-img"></div>
        <div class="overlay-title">GAME OVER</div>
        <div class="overlay-buttons">
            <button onclick="restart()">REPLAY</button>
        </div>
    </div>
</div>

<script>
const SIZE = 4;
let tiles = [];
let board = [];
let score = 0;
let best = localStorage.getItem("bestScore") || 0;
let idCounter = 0;
let moving = false;
let wonShown = false;

let cellSize;
let gap = 10;

const tileLayer = document.getElementById("tiles");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const boardEl = document.getElementById("board");
const bg = document.getElementById("bg");

bestEl.innerText = best;

function calculateLayout(){
    const size = boardEl.clientWidth;
    cellSize = (size - gap * 5) / 4;
    tiles.forEach(t => {
        t.el.style.width = cellSize + "px";
        t.el.style.height = cellSize + "px";
        updateTile(t);
    });
}

function pos(r, c){
    return {
        top: gap + (cellSize + gap) * r,
        left: gap + (cellSize + gap) * c
    };
}

function createTile(value, r, c){
    const el = document.createElement("div");
    el.className = "tile";
    el.style.width = cellSize + "px";
    el.style.height = cellSize + "px";
    el.style.backgroundImage = url('./images/img_${value}.jpg');
    tileLayer.appendChild(el);

    const tile = {
        id: idCounter++,
        value,
        r,
        c,
        el,
        merged: false,
        isRemoving: false
    };

    tiles.push(tile);
    updateTile(tile);
    el.style.transform = "scale(0)";
    requestAnimationFrame(() => { el.style.transform = "scale(1)"; });
}

function updateTile(tile){
    const p = pos(tile.r, tile.c);
    tile.el.style.top = p.top + "px";
    tile.el.style.left = p.left + "px";
    tile.el.style.backgroundImage = url('./images/img_${tile.value}.jpg');
    
    if(tile.merged) {
        tile.el.classList.add("tile-merge");
    }
    if(tile.isRemoving) {
        tile.el.classList.add("tile-removing");
    }
}

function rebuildBoard(){
    board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
    tiles.forEach(t => {
        if(!t.isRemoving) board[t.r][t.c] = t;
    });
}

function spawn(){
    rebuildBoard();
    const empty = [];
    for(let r=0; r<SIZE; r++)
        for(let c=0; c<SIZE; c++)
            if(!board[r][c]) empty.push({r, c});

    if(!empty.length) return;
    const {r, c} = empty[Math.floor(Math.random() * empty.length)];
    createTile(Math.random() < 0.9 ? 2 : 4, r, c);
}

function has2048Tile(){
    return tiles.some(t => !t.isRemoving && t.value >= 2048);
}

function move(dir){
    if(moving) return;
    if(document.getElementById("gameover").style.display === "flex") return;
    if(document.getElementById("winoverlay").style.display === "flex") return;

    moving = true;
    rebuildBoard();
    
    // 이동 전 모든 타일의 병합 상태 초기화
    tiles.forEach(t => t.merged = false);

    let moved = false;
    let order = [0, 1, 2, 3];
    if(dir === "ArrowRight" || dir === "ArrowDown") order = [3, 2, 1, 0];

    for(let r of order){
        for(let c of order){
            let tile = board[r][c];
            if(!tile) continue;

            let nr = r;
            let nc = c;

            while(true){
                let tr = nr, tc = nc;
                if(dir === "ArrowLeft") tc--;
                else if(dir === "ArrowRight") tc++;
                else if(dir === "ArrowUp") tr--;
                else if(dir === "ArrowDown") tr++;

                if(tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;

                let target = board[tr][tc];
                if(!target){
                    // 빈 공간으로 이동
                    board[nr][nc] = null;
                    nr = tr; nc = tc;
                    board[nr][nc] = tile;
                    moved = true;
                } else if(target.value === tile.value && !target.merged && !tile.merged){
                    // 병합 발생
                    board[nr][nc] = null;
                    target.value *= 2;
                    target.merged = true; // 병합된 타일임을 표시
                    score += target.value;
                    
                    nr = tr; nc = tc;
                    tile.isRemoving = true; // 이동해온 타일은 삭제 대기
                    moved = true;
                    break;
                } else break;
            }
            tile.r = nr; tile.c = nc;
        }
    }

    if(moved){
        tiles.forEach(updateTile);
        scoreEl.innerText = score;
        if(score > best){
            best = score;
            localStorage.setItem("bestScore", best);
            bestEl.innerText = best;
        }

        setTimeout(() => {
            // 삭제 대기 타일 실제 제거 및 병합 플래그 청소
            tiles.filter(t => t.isRemoving).forEach(t => t.el.remove());
            tiles = tiles.filter(t => !t.isRemoving);
            tiles.forEach(t => {
                t.merged = false;
                t.el.classList.remove("tile-merge");
            });

            spawn();
            if(!wonShown && has2048Tile()){
                showWin();
                wonShown = true;
            }
            if(isGameOver()) showGameOver();
            moving = false;
        }, 150);
    } else {
        moving = false;
    }
}

function isGameOver(){
    rebuildBoard();
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            if(!board[r][c]) return false;
            if(c < SIZE-1 && board[r][c+1] && board[r][c].value === board[r][c+1].value) return false;
            if(r < SIZE-1 && board[r+1][c] && board[r][c].value === board[r+1][c].value) return false;
        }
    }
    return true;
}

function getMaxTile(){
    let max = 0;
    tiles.forEach(t => { if(t.value > max) max = t.value; });
    return max;
}

function showWin(){
    const overlay = document.getElementById("winoverlay");
    const img = document.getElementById("win-img");
    img.style.backgroundImage = url('./images/img_2048.jpg');
    overlay.style.display = "flex";
}

function showGameOver(){
    const overlay = document.getElementById("gameover");
    const img = document.getElementById("gameover-img");
    const max = getMaxTile();
    img.style.backgroundImage = url('./images/img_${max}.jpg');
    overlay.style.display = "flex";
}

function restart(){
    location.reload();
}

window.addEventListener("keydown", e => {
    if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
        e.preventDefault();
        move(e.key);
    }
});

let startX = 0, startY = 0;
document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, {passive:true});

document.addEventListener("touchend", e => {
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;
    if(Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;
    if(Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    else move(dy > 0 ? "ArrowDown" : "ArrowUp");
}, {passive:true});

function init(){
    calculateLayout();
    window.addEventListener("resize", calculateLayout);
    for(let i=0; i<16; i++){
        let d = document.createElement("div");
        d.className = "cell";
        bg.appendChild(d);
    }
    spawn(); spawn();
}
init();
</script>
</body>
</html>
