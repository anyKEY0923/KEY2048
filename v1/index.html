<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root{
    --board-size:min(92vw,420px);
    --bg1:#f1f2fb;
    --bg2:#e4e8f6;
    --board:#c5cbe6;
    --board-dark:#adb6da;
    --panel1:#bdb4ee;
    --panel2:#a493e4;
    --panel-label:#f7f7ff;
    --panel-value:#ffffff;
    --text:#5a5f86;
    --sub:#747a9f;
    --gap:10px;
    --pad-x:10px;
    --pad-top:12px;
    --pad-bottom:10px;
    --tile-radius:8px;
}
*{ box-sizing:border-box; }
html, body{ margin:0; min-height:100%; }
html{ overflow-x:hidden; overflow-y:auto; }
body{
    background: radial-gradient(circle at top, #ffffff 0%, var(--bg1) 38%, var(--bg2) 100%);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    padding:18px 0 24px;
    color:var(--text);
    overflow-x:hidden;
}

#app{
    width:var(--board-size);
    display:flex;
    flex-direction:column;
    align-items:stretch;
    position:relative;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
    flex:0 0 auto;
}

.version-note{ font-size:12px; color:#8a90b0; margin-bottom:8px; text-align:center; }

.title-banner{
    width:100%;
    aspect-ratio:3.5 / 1;
    background-image:url('./images/img_title.jpg');
    background-size:cover;
    background-position:center;
    border:none;
    border-radius:16px;
    margin-bottom:8px;
    box-shadow: 0 12px 22px rgba(84,96,156,.12);
    cursor:pointer;
    transition:transform .12s ease;
}

.top-panel{ width:100%; display:flex; gap:12px; margin-bottom:12px; }
.score-card{
    flex:1;
    position:relative;
    background:linear-gradient(180deg, var(--panel1) 0%, var(--panel2) 100%);
    border-radius:16px;
    padding:12px 14px;
    min-height:72px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.score-value{ font-size:26px; font-weight:bold; color:var(--panel-value); }

#board{
    position:relative;
    width:100%;
    aspect-ratio:1 / 1;
    background: linear-gradient(180deg, #d3daf0 0%, var(--board) 56%, var(--board-dark) 100%);
    border-radius:20px;
    overflow:hidden;
}

.grid{
    position:absolute;
    top:var(--pad-top); left:var(--pad-x); right:var(--pad-x); bottom:var(--pad-bottom);
    display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr); gap:var(--gap);
}
.cell{ background:rgba(239,242,250,.52); border-radius:var(--tile-radius); }

#tiles, #anim-layer{
    position:absolute;
    top:var(--pad-top); left:var(--pad-x); right:var(--pad-x); bottom:var(--pad-bottom);
    pointer-events:none;
}

.tile {
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:var(--tile-radius);
    background-size:cover;
    background-position:center;
    /* 움찔거림 방지를 위한 핵심 설정 */
    will-change: transform;
    transform: translateZ(0);
    backface-visibility: hidden;
    transition: top 0.15s ease, left 0.15s ease, transform 0.1s ease;
}

.tile-num{
    position:absolute; right:6px; bottom:6px; min-width:22px; padding:2px 6px;
    border-radius:999px; background:rgba(255,255,255,.74); color:#5f6585;
    font-size:11px; font-weight:700; backdrop-filter:blur(2px);
}

.overlay{
    position:absolute; inset:0; display:none; flex-direction:column; align-items:center;
    justify-content:center; background:rgba(65,72,116,.8); color:white; z-index:100; border-radius:20px;
}
.overlay button{
    padding:12px 20px; font-size:16px; font-weight:800; border:none; border-radius:12px;
    cursor:pointer; background:white; color:var(--panel2);
}
</style>
</head>
<body>

<div id="app">
    <div class="version-note">다시 시작하려면 복실이를 눌러주세요11.</div>
    <button class="title-banner" id="title-banner" onclick="restart()"></button>

    <div class="top-panel">
        <div class="score-card">
            <div style="color:white; font-size:12px;">현재점수</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-card">
            <div style="color:white; font-size:12px;">최고기록</div>
            <div class="score-value" id="best">0</div>
        </div>
    </div>

    <div id="board">
        <div class="grid" id="bg"></div>
        <div id="tiles"></div>
        <div id="winoverlay" class="overlay">
            <h2>축하합니다!</h2>
            <button onclick="restart()">다시 시작</button>
        </div>
        <div id="gameover" class="overlay">
            <h2>게임 오버</h2>
            <button onclick="restart()">다시 도전</button>
        </div>
    </div>
</div>

<script>
const SIZE = 4;
const GAP = 10;
let board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
let score = 0;
let best = localStorage.getItem("bestScore") || 0;

const tilesEl = document.getElementById("tiles");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const bgEl = document.getElementById("bg");

// 초기 배경 그리드 생성
for(let i=0; i<SIZE*SIZE; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    bgEl.appendChild(cell);
}

function init() {
    board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
    score = 0;
    bestEl.innerText = best;
    tilesEl.innerHTML = "";
    addRandom();
    addRandom();
    render();
}

function addRandom() {
    let empty = [];
    for(let r=0; r<SIZE; r++) {
        for(let c=0; c<SIZE; c++) {
            if(board[r][c] === 0) empty.push({r,c});
        }
    }
    if(empty.length > 0) {
        let {r, c} = empty[Math.floor(Math.random()*empty.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }
}

function render() {
    scoreEl.innerText = score;
    const rect = bgEl.getBoundingClientRect();
    const cellW = (rect.width - (GAP * (SIZE - 1))) / SIZE;
    const cellH = (rect.height - (GAP * (SIZE - 1))) / SIZE;

    // 현재 화면에 있는 타일 ID들 추적
    const currentTileIds = new Set();

    for(let r=0; r<SIZE; r++) {
        for(let c=0; c<SIZE; c++) {
            const val = board[r][c];
            if(val > 0) {
                const tileId = `tile-val-${r}-${c}`; // 위치 기반이 아닌 상태 기반 ID (간소화)
                currentTileIds.add(tileId);
                
                let tileEl = document.getElementById(tileId);
                if(!tileEl) {
                    tileEl = document.createElement("div");
                    tileEl.id = tileId;
                    tileEl.className = "tile";
                    tileEl.innerHTML = `<div class="tile-num">${val}</div>`;
                    tilesEl.appendChild(tileEl);
                }

                tileEl.style.width = cellW + "px";
                tileEl.style.height = cellH + "px";
                tileEl.style.top = (r * (cellH + GAP)) + "px";
                tileEl.style.left = (c * (cellW + GAP)) + "px";
                tileEl.style.backgroundImage = `url('./images/img_${val}.jpg')`;
                
                // 값이 바뀌었을 경우 숫자 업데이트
                const numEl = tileEl.querySelector(".tile-num");
                if(numEl.innerText != val) numEl.innerText = val;
            }
        }
    }

    // 보드에 없는 데이터인데 DOM에 남아있는 타일 삭제
    const allTiles = tilesEl.querySelectorAll(".tile");
    allTiles.forEach(t => {
        if(!currentTileIds.has(t.id)) tilesEl.removeChild(t);
    });
}

function move(dir) {
    let moved = false;
    // 방향별 이동 로직 (기존 로직 사용)
    // 이동 성공 시 moved = true;
    
    // 임시 이동 로직 (상하좌우 키 입력 대응용)
    const backup = JSON.stringify(board);
    
    // 실제 게임 로직은 생략되어 있으나, 이동 후에는 반드시 render() 호출
    if (moved) {
        addRandom();
        render();
        checkGameOver();
    }
}

function restart() {
    document.getElementById("winoverlay").style.display = "none";
    document.getElementById("gameover").style.display = "none";
    init();
}

window.addEventListener("keydown", (e) => {
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
        // 실제 이동 함수 호출 부분
        render(); 
    }
});

// 시작
init();
</script>
</body>
</html>
