<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
body{
    margin:0;
    background:#faf8ef;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    touch-action:none;
}
h2{
    margin-bottom:10px;
}
#board{
    position:relative;
    width:min(92vw,420px);
    height:min(92vw,420px);
    background:#bbada0;
    padding:10px;
    border-radius:6px;
    box-sizing:border-box;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:10px;
    height:100%;
}
.cell{
    background:rgba(238,228,218,.35);
    border-radius:3px;
}
#tiles,
#anim-layer{
    position:absolute;
    inset:10px;
    pointer-events:none;
}
.tile,
.anim-tile{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    background-size:cover;
    background-position:center;
}
.anim-tile{
    transition:
        top .14s ease,
        left .14s ease,
        opacity .14s ease,
        transform .14s ease;
    z-index:20;
}
.tile{
    z-index:5;
}
.tile-new{
    transform:scale(0);
    animation:popIn .14s ease forwards;
}
.tile-merge{
    animation:merge .22s ease-out;
    will-change:transform;
}
@keyframes popIn{
    from{ transform:scale(0); }
    to{ transform:scale(1); }
}
@keyframes merge{
    0%{ transform:scale(1); }
    45%{ transform:scale(1.22); }
    100%{ transform:scale(1); }
}
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.65);
    color:white;
    z-index:100;
}
.overlay-img{
    width:180px;
    height:180px;
    background-size:cover;
    background-position:center;
    border-radius:8px;
    margin-bottom:20px;
}
.overlay-title{
    margin-bottom:15px;
    font-size:22px;
    font-weight:bold;
}
.overlay-buttons{
    display:flex;
    gap:10px;
}
.overlay button{
    padding:12px 26px;
    font-size:18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<div style="font-size:12px; color:#888; margin-bottom:6px;">
v1.9.1 수정 : 병합 타일 깜빡임 수정, 최종 렌더 후 타일 레이어 표시 순서로 변경
</div>

<h2>
Score <span id="score">0</span>
&nbsp;&nbsp;
Best <span id="best">0</span>
</h2>

<div id="board">
    <div class="grid" id="bg"></div>
    <div id="tiles"></div>
    <div id="anim-layer"></div>

    <div id="winoverlay" class="overlay">
        <div id="win-img" class="overlay-img"></div>
        <div class="overlay-title">YOU WIN</div>
        <div class="overlay-buttons">
            <button onclick="restart()">REPLAY</button>
        </div>
    </div>

    <div id="gameover" class="overlay">
        <div id="gameover-img" class="overlay-img"></div>
        <div class="overlay-title">GAME OVER</div>
        <div class="overlay-buttons">
            <button onclick="restart()">REPLAY</button>
        </div>
    </div>
</div>

<script>
const SIZE = 4;
const GAP = 10;
const MOVE_MS = 140;

let board = [];
let score = 0;
let best = Number(localStorage.getItem("bestScore") || 0);
let wonShown = false;
let moving = false;
let cellSize = 0;

let lastSpawn = null;
let mergeCells = [];

const tilesEl = document.getElementById("tiles");
const animLayer = document.getElementById("anim-layer");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const boardEl = document.getElementById("board");
const bg = document.getElementById("bg");
const winOverlay = document.getElementById("winoverlay");
const gameOverOverlay = document.getElementById("gameover");
const winImg = document.getElementById("win-img");
const gameOverImg = document.getElementById("gameover-img");

bestEl.innerText = String(best);

function emptyBoard(){
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
}

function calculateLayout(){
    const size = boardEl.clientWidth;
    cellSize = (size - GAP * 5) / 4;
    renderBoard();
}

function pos(r, c){
    return {
        top: (cellSize + GAP) * r,
        left: (cellSize + GAP) * c
    };
}

function hideOverlays(){
    winOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";
}

function showWin(){
    winImg.style.backgroundImage = "url('./images/img_2048.jpg')";
    winOverlay.style.display = "flex";
}

function showGameOver(){
    const max = getMaxTile() || 2;
    gameOverImg.style.backgroundImage = `url('./images/img_${max}.jpg')`;
    gameOverOverlay.style.display = "flex";
}

function getMaxTile(){
    let max = 0;
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] > max) max = board[r][c];
        }
    }
    return max;
}

function updateScore(){
    scoreEl.innerText = String(score);
    if(score > best){
        best = score;
        localStorage.setItem("bestScore", String(best));
        bestEl.innerText = String(best);
    }
}

function renderBoard(){
    if(!cellSize) return;

    tilesEl.innerHTML = "";

    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            const value = board[r][c];
            if(!value) continue;

            const tile = document.createElement("div");
            tile.className = "tile";
            tile.style.width = cellSize + "px";
            tile.style.height = cellSize + "px";

            const p = pos(r, c);
            tile.style.top = p.top + "px";
            tile.style.left = p.left + "px";
            tile.style.backgroundImage = `url('./images/img_${value}.jpg')`;

            if(lastSpawn && lastSpawn.r === r && lastSpawn.c === c){
                tile.classList.add("tile-new");
            }

            if(mergeCells.some(m => m.r === r && m.c === c)){
                tile.classList.add("tile-merge");
            }

            tilesEl.appendChild(tile);
        }
    }
}

function getEmptyCells(){
    const empty = [];
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) empty.push({ r, c });
        }
    }
    return empty;
}

function spawn(){
    const empty = getEmptyCells();
    if(empty.length === 0){
        lastSpawn = null;
        return;
    }

    const pick = empty[Math.floor(Math.random() * empty.length)];
    board[pick.r][pick.c] = Math.random() < 0.9 ? 2 : 4;
    lastSpawn = { r: pick.r, c: pick.c };
}

function has2048Tile(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] >= 2048) return true;
        }
    }
    return false;
}

function isGameOver(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) return false;
            if(c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
            if(r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
        }
    }
    return true;
}

function cloneBoard(src){
    return src.map(row => [...row]);
}

function linesEqual(a, b){
    for(let i = 0; i < a.length; i++){
        if(a[i] !== b[i]) return false;
    }
    return true;
}

function slideAndMergeLineDetailed(line){
    const items = [];
    for(let i = 0; i < line.length; i++){
        if(line[i] !== 0){
            items.push({ value: line[i], from: i });
        }
    }

    const result = Array(SIZE).fill(0);
    const moves = [];
    const merges = [];
    let gained = 0;
    let write = 0;

    for(let i = 0; i < items.length; i++){
        const cur = items[i];
        const next = items[i + 1];

        if(next && cur.value === next.value){
            const mergedValue = cur.value * 2;
            result[write] = mergedValue;
            gained += mergedValue;

            moves.push({
                from: cur.from,
                to: write,
                value: cur.value,
                merged: true
            });
            moves.push({
                from: next.from,
                to: write,
                value: next.value,
                merged: true
            });

            merges.push({
                index: write,
                value: mergedValue
            });

            i++;
            write++;
        }else{
            result[write] = cur.value;
            moves.push({
                from: cur.from,
                to: write,
                value: cur.value,
                merged: false
            });
            write++;
        }
    }

    return {
        line: result,
        gained,
        moves,
        merges
    };
}

function buildMoveResult(dir){
    const oldBoard = cloneBoard(board);
    const newBoard = emptyBoard();
    const animations = [];
    const mergedCellsOut = [];
    let moved = false;
    let gainedTotal = 0;

    if(dir === "ArrowLeft" || dir === "ArrowRight"){
        for(let r = 0; r < SIZE; r++){
            const original = [...oldBoard[r]];
            const working = dir === "ArrowLeft" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalLine = dir === "ArrowLeft" ? res.line : [...res.line].reverse();

            newBoard[r] = finalLine;
            gainedTotal += res.gained;

            if(!linesEqual(original, finalLine)) moved = true;

            res.moves.forEach(m => {
                const fromC = dir === "ArrowLeft" ? m.from : (SIZE - 1 - m.from);
                const toC = dir === "ArrowLeft" ? m.to : (SIZE - 1 - m.to);

                animations.push({
                    fromR: r,
                    fromC,
                    toR: r,
                    toC,
                    value: m.value,
                    merged: m.merged
                });
            });

            res.merges.forEach(m => {
                const c = dir === "ArrowLeft" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }else{
        for(let c = 0; c < SIZE; c++){
            const original = [];
            for(let r = 0; r < SIZE; r++) original.push(oldBoard[r][c]);

            const working = dir === "ArrowUp" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalCol = dir === "ArrowUp" ? res.line : [...res.line].reverse();

            for(let r = 0; r < SIZE; r++) newBoard[r][c] = finalCol[r];
            gainedTotal += res.gained;

            if(!linesEqual(original, finalCol)) moved = true;

            res.moves.forEach(m => {
                const fromR = dir === "ArrowUp" ? m.from : (SIZE - 1 - m.from);
                const toR = dir === "ArrowUp" ? m.to : (SIZE - 1 - m.to);

                animations.push({
                    fromR,
                    fromC: c,
                    toR,
                    toC: c,
                    value: m.value,
                    merged: m.merged
                });
            });

            res.merges.forEach(m => {
                const r = dir === "ArrowUp" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }

    return {
        oldBoard,
        newBoard,
        animations,
        mergeCells: mergedCellsOut,
        gained: gainedTotal,
        moved
    };
}

function createAnimTile(value, r, c){
    const el = document.createElement("div");
    el.className = "anim-tile";
    el.style.width = cellSize + "px";
    el.style.height = cellSize + "px";

    const p = pos(r, c);
    el.style.top = p.top + "px";
    el.style.left = p.left + "px";
    el.style.backgroundImage = `url('./images/img_${value}.jpg')`;

    animLayer.appendChild(el);
    return el;
}

function playMoveAnimation(animations, onDone){
    animLayer.innerHTML = "";

    if(animations.length === 0){
        onDone();
        return;
    }

    const animTiles = animations.map(a => {
        const el = createAnimTile(a.value, a.fromR, a.fromC);
        return { el, ...a };
    });

    tilesEl.style.visibility = "hidden";

    requestAnimationFrame(() => {
        animTiles.forEach(a => {
            const p = pos(a.toR, a.toC);
            a.el.style.top = p.top + "px";
            a.el.style.left = p.left + "px";

            if(a.merged){
                a.el.style.opacity = "0.9";
            }
        });
    });

    setTimeout(() => {
        animLayer.innerHTML = "";
        onDone();
    }, MOVE_MS + 20);
}

function move(dir){
    if(moving) return;
    if(winOverlay.style.display === "flex") return;
    if(gameOverOverlay.style.display === "flex") return;

    moving = true;
    lastSpawn = null;
    mergeCells = [];

    const res = buildMoveResult(dir);

    if(!res.moved){
        moving = false;
        return;
    }

    score += res.gained;
    updateScore();

    playMoveAnimation(res.animations, () => {
        board = res.newBoard;
        mergeCells = res.mergeCells;

        spawn();
        renderBoard();
        tilesEl.style.visibility = "visible";

        setTimeout(() => {
            mergeCells = [];
        }, 220);

        if(!wonShown && has2048Tile()){
            wonShown = true;
            showWin();
        }else if(isGameOver()){
            showGameOver();
        }

        moving = false;
    });
}

function restart(){
    hideOverlays();
    animLayer.innerHTML = "";
    tilesEl.style.visibility = "visible";

    board = emptyBoard();
    score = 0;
    wonShown = false;
    moving = false;
    lastSpawn = null;
    mergeCells = [];

    scoreEl.innerText = "0";
    bestEl.innerText = String(best);

    spawn();
    spawn();
    renderBoard();
}

window.addEventListener("keydown", e => {
    if(e.shiftKey && (e.key === "W" || e.key === "w")){
        e.preventDefault();
        if(winOverlay.style.display === "flex"){
            hideOverlays();
        }else{
            showWin();
        }
        return;
    }

    if(e.key === "Escape"){
        hideOverlays();
        return;
    }

    if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
        e.preventDefault();
        move(e.key);
    }
});

let startX = 0;
let startY = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, { passive:true });

document.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    if(Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;

    if(Math.abs(dx) > Math.abs(dy)){
        move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    }else{
        move(dy > 0 ? "ArrowDown" : "ArrowUp");
    }
}, { passive:true });

function init(){
    for(let i = 0; i < 16; i++){
        const d = document.createElement("div");
        d.className = "cell";
        bg.appendChild(d);
    }

    board = emptyBoard();
    updateScore();
    spawn();
    spawn();
    calculateLayout();
    window.addEventListener("resize", calculateLayout);
}

init();
</script>
</body>
</html>
