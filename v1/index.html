```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
background:#faf8ef;
font-family:Arial;
}

#board{
position:relative;
width:400px;
height:400px;
background:#bbada0;
padding:10px;
border-radius:6px;
box-sizing:border-box;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-template-rows:repeat(4,1fr);
gap:10px;
height:100%;
}

.cell{
background:rgba(238,228,218,.35);
border-radius:3px;
}

.tile{
position:absolute;
width:87.5px;
height:87.5px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
border-radius:3px;

transition:
top .16s ease,
left .16s ease,
transform .16s ease;

background-size:cover;
background-position:center;
color:transparent;
}

.tile-merge{
animation:merge .18s ease;
}

@keyframes merge{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* 이미지 */

.tile-2 { background-image:url('./images/img_2.jpg'); }
.tile-4 { background-image:url('./images/img_4.jpg'); }
.tile-8 { background-image:url('./images/img_8.jpg'); }
.tile-16 { background-image:url('./images/img_16.jpg'); }
.tile-32 { background-image:url('./images/img_32.jpg'); }
.tile-64 { background-image:url('./images/img_64.jpg'); }
.tile-128 { background-image:url('./images/img_128.jpg'); }
.tile-256 { background-image:url('./images/img_256.jpg'); }
.tile-512 { background-image:url('./images/img_512.jpg'); }
.tile-1024 { background-image:url('./images/img_1024.jpg'); }
.tile-2048 { background-image:url('./images/img_2048.jpg'); }

</style>
</head>

<body>

<h2>Score <span id="score">0</span></h2>

<div id="board">
<div class="grid" id="bg"></div>
<div id="tiles"></div>
</div>

<script>

const SIZE=4
let board=[]
let tiles=[]
let score=0
let idCounter=0

const tileLayer=document.getElementById("tiles")
const scoreEl=document.getElementById("score")

function pos(r,c){
return{
top:r*97.5+10,
left:c*97.5+10
}
}

function createTile(value,r,c){

let el=document.createElement("div")
el.className=`tile tile-${value}`

tileLayer.appendChild(el)

let tile={
id:idCounter++,
value,
r,
c,
el,
merged:false
}

tiles.push(tile)

updateTile(tile)

}

function updateTile(tile){

let p=pos(tile.r,tile.c)

tile.el.style.top=p.top+"px"
tile.el.style.left=p.left+"px"
tile.el.className=`tile tile-${tile.value}`

if(tile.merged){
tile.el.classList.add("tile-merge")
tile.merged=false
}

}

function spawn(){

let empty=[]

for(let r=0;r<SIZE;r++)
for(let c=0;c<SIZE;c++)
if(!board[r][c])
empty.push({r,c})

if(!empty.length) return

let {r,c}=empty[Math.floor(Math.random()*empty.length)]
let value=Math.random()<0.9?2:4

board[r][c]=true

createTile(value,r,c)

}

function rebuildBoard(){

board=Array(SIZE).fill().map(()=>Array(SIZE).fill(null))

tiles.forEach(t=>{
board[t.r][t.c]=t
})

}

function move(dir){

let moved=false

rebuildBoard()

let order=[0,1,2,3]

if(dir=="ArrowRight"||dir=="ArrowDown")
order=[3,2,1,0]

for(let r of order){
for(let c of order){

let tile=board[r][c]
if(!tile) continue

let nr=r
let nc=c

while(true){

let tr=nr
let tc=nc

if(dir=="ArrowLeft") tc--
if(dir=="ArrowRight") tc++
if(dir=="ArrowUp") tr--
if(dir=="ArrowDown") tr++

if(tr<0||tr>=SIZE||tc<0||tc>=SIZE) break

let target=board[tr][tc]

if(!target){

board[nr][nc]=null
nr=tr
nc=tc
board[nr][nc]=tile
moved=true

}else if(target.value==tile.value && !target.merged){

board[nr][nc]=null

target.value*=2
target.merged=true
score+=target.value

tile.el.remove()
tiles=tiles.filter(t=>t!=tile)

moved=true

break

}else break

}

tile.r=nr
tile.c=nc

}

}

if(moved){

tiles.forEach(updateTile)

scoreEl.innerText=score

spawn()

}

}

window.addEventListener("keydown",e=>{
if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key))
move(e.key)
})

function init(){

for(let i=0;i<16;i++){
let d=document.createElement("div")
d.className="cell"
bg.appendChild(d)
}

board=Array(SIZE).fill().map(()=>Array(SIZE).fill(null))

spawn()
spawn()

}

init()

</script>

</body>
</html>
